body:
  text: 天台山幽谿沙門傳燈著文殊師利菩薩降魔緣此猶屬分真即性惡法門第五緣魔逆經云文殊師利菩薩與大光天子演說大法天子聞已報曰難及云云至未曾有文殊師利今所說者微妙巍巍無極之慧超異如是而魔波旬不來至此欲廢亂之行於逆乎適說是已須臾未久時魔波旬在於虗空興大雲雨謦揚大音其音普聞一切時眾各心念言何等聲流溢乃爾爾時世尊告文殊師利仁寧見魔所興亂乎答曰唯然天中天文殊師利即如其像三昧思惟令魔自然五處見縛尋便墮地喚呼稱怨恚恨罵詈文殊師利今當祖械鎻縛我身文殊答曰咄魔波旬復有繫縛堅固難解逾過於此今者所被如卿不覺何謂堅縛吾我顛倒恩愛邪見縛因緣繫縛卿常為此枷鎻所縛不自覺知魔又啟曰惟見原赦使得解脫文殊答曰汝當興造行作佛事我能令卿從縛得脫魔即對曰我於佛法無所妨廢亦無所壞當以何因興作佛事文殊答曰波旬欲知興作佛事乃為菩薩智慧變化假使如來興作佛事不足為難魔作佛事斯乃為奇於是文殊師利即如其像三昧思惟使魔波旬變作佛像三十二相莊嚴其身坐師子床智慧辨才所說如佛而宣此言所欲問者一切眾生諸所狐疑自恣所啟當為發遣時大迦葉問魔波旬比丘修行以何為縛魔尋答曰計我禪定而志寂然則是有想無想品第想空為要毀眾見想想於要想興於眾念御無願想壞諸所願為泥洹想而樂無為毀生死想是迦葉修行比丘之繫也所以者何迦葉當知不當毀壞諸所獨見因而行空也所謂空者諸見皆空不當毀念未於無相所以者何敢可所念悉為無相不當毀願而求無願其所願者悉亦無願不當毀生死而求泥洹曉了生死不可得處則為泥洹迦葉當知其行泥洹不起思想當於眾著令無所起毀壞滅盡泥洹本淨無所起生乃為無為說是語時五百比丘心逮清淨如是乃至須菩提舍利弗目揵連其尊弟子五百人等各各自問己身所知時魔波旬各各分別而發之於是諸天天眾有一天子名曰須深問魔波旬文殊師利屬者講說諸魔事業仁豈堪任重復理議何謂菩薩之魔事時魔答曰天子當知菩薩魔事則有二十何謂二十恐畏生死欲得解脫遵修玩習於佛正法稽首歸命而有望想則為魔業如是菩薩魔事凡有二十具說如經於時世尊讚魔波旬善哉善哉快說於斯菩薩魔事假使有人論此法事聽省奉行不從魔教其人則建佛大道法說講經典獲諸二十事何為二十大慈大哀如是凡有二十條具如經說於是須深天子問魔波旬怯哉善利巧為如來之所嗟歎時魔報曰吾身不用快哉善利譬如男子鬼神著之當可所說計實不是其人所語鬼神所言也如是仁者今吾所說文殊師利之所發動不當宣傳言是我說天子問曰今仁變成佛身形不以歡乎又復相好莊嚴其身坐師子床講說經法不以樂耶魔復報曰卿等見我相好嚴身我還自觀枷鎻繫縛天子告曰波旬自歸悔過伏罪文殊師利文殊師利威神原赦波旬波旬答曰不當首悔學於大乘菩薩大士所以者何行菩薩者不見缺漏瑕穢之界興嗔恚者設壞冤恨乃當對悔稽首自歸天子又問菩薩忍辱為何等類其魔報曰菩薩忍辱有十二事何謂十二志性忍辱而無瑕玼如是有十二種如經具說於是須深天子問魔波旬卿若尋說此二十事至十二忍寧踴躍乎答曰歡喜須深即啟文殊師利仁者原赦魔波旬罪文殊問魔誰為繫汝報曰不知誰為縛我答曰波旬卿不被縛自想為縛一切愚癡凡夫之士其亦若茲心本悉淨無所思念志在想著不知無常計有常想苦為樂想無身計身不淨淨想無色色想無痛癢思想生死識而想五陰如今波旬惡畏繫縛何因得脫又曰今我不復得解脫乎答曰如是波旬已得解脫者不復更脫何因得脫由緣從於虗偽之想而致繫縛蠲除此穢名曰解脫於是文殊師利捨所建立威神感動令魔波旬即復如故文殊師利復與須深天子說法將畢爾時魔波旬心懷憂戚泣淚如雨而說此言若此經典所流布處諸魔波旬不得其便脫有受持斷絕魔事魔說此語即便沒去魔界行不汙菩薩化魔緣首楞嚴三昧經云舍利弗白佛言世尊未曾有也今說首楞嚴三昧而是惡魔不來嬈亂佛告舍利弗汝欲見魔衰惱事不唯然已見爾時佛放眉間白毫相光一切眾會皆見惡魔被五繫縛不能自解佛告舍利弗汝見惡魔被五縛不唯然已見此惡魔者為誰所縛佛言是首楞嚴三昧威神之力爾時會中有一菩薩名魔界行不汙白佛言唯然世尊我今當現於魔界中自在神力令魔得住首楞嚴三昧佛言隨意時魔界行不汙菩薩即於會中忽然不現現於魔宮語惡魔言汝寧不聞佛說首楞嚴三昧無量眾生皆發阿耨多羅三藐三菩提心出汝境界亦復當度脫餘人出汝境界魔即報言我聞佛說首楞嚴三昧名字以被五縛不能得往所謂兩手兩足及頭又問惡魔誰繫汝者魔即答言我適發心欲往壞聽受首楞嚴三昧者即被五縛我適復念諸佛菩薩大有威德難可壞亂我若往者或當自壞不如自住於此宮殿作是念已即於五縛而得解脫菩薩答言如是一切凡夫憶想分別顛倒取相是故有縛動念戲論是故有縛見聞覺知是故有縛此中實無縛者解者所以者何諸法無縛本解脫諸法無縛本無脫故常解脫相世問愚癡如來以此法門說法若有眾生得知此義欲求解脫勤心精進則於諸縛而得解脫時魔眾中七百天女以天香華末香塗香及諸瓔珞散魔界行不汙菩薩而作是言我何時於魔境界而得解脫菩薩報言汝等若能不壞魔縛則得解脫云何名為魔縛謂六十二見若人不壞此諸見者即於魔縛而得解脫天女復言云何名為不壞諸見而得解脫答言諸見本無所從來去無所至若諸知見無去來相者即於魔縛而得解脫諸見非有非無若不分別有無即於魔縛而得解脫若無所見是為丘見如是正見無正無邪若法無正無邪無作無受即於魔縛而得解脫是諸見者非內非外亦非中間如是諸見亦復不念即於魔縛而得解脫七百天女聞說此法即得順忍而作是言我等亦當於魔界中行無所汙度脫一切魔所縛者爾時魔界行不汙菩薩語惡魔言汝諸眷屬已發阿耨多羅三藐三菩提心當從此縛而得解脫時諸天女慈愍魔故皆作是言可發阿耨多羅三藐三菩提心弗於安隱生怖畏想弗於樂中而生苦想弗於解脫而生縛想爾時惡魔生諂曲心而作是言若汝捨離菩提心者我當發心時諸天女以方便力而謂魔言我等皆已捨離此心汝便可發阿耨多羅三藐三菩提心若一菩薩發菩提心一切菩薩亦同是心所以者何心無差別於諸眾生心皆平等爾時惡魔謂魔界行不汙菩薩言我今當發阿耨多羅三藐三菩提心以是善根令我脫縛說此言已即自見身從縛解脫時魔界行不汙菩薩以神通力放大光明現淨妙身照於魔宮魔自見身無有威光猶如墨聚時魔眾中二百天女深著婬欲見此菩薩身色端正起染愛心各作是言是人若能與我從事我等皆當隨順其教時此菩薩知諸天女宿緣應度即時化作二百天子色貌端嚴如身無異又作二百寶交露臺勝魔宮觀是諸天女皆自見身在此寶臺各各自謂與此菩薩共相娛樂所願得滿婬欲意息皆生深心愛敬菩薩菩薩即時隨其所應而為說法皆發阿耨多羅三藐三菩提心時魔界行不汙菩薩謂惡魔言汝可詣佛魔作是念我縛已解當詣佛所壞亂說法爾時惡魔眷屬圍遶行詣佛所白言世尊弗復說是首楞嚴三昧所以者何說是三昧我身即時被五繫縛惟願如來更說餘事時堅意菩薩謂惡魔言誰解汝縛答言魔界行不汙菩薩解我繫縛汝許何事而得解脫魔言我許發阿耨多羅三藐三菩提心爾時佛告堅意菩薩今是惡魔為解縛故發菩提心非清淨意如是堅意我滅度後後五百歲多有比丘為利養故發菩提心非清淨意堅意汝觀首楞嚴三昧勢力佛法威神是諸比丘比丘尼優婆塞優婆夷以輕戲心貪利養心隨逐它心聞是三昧而發菩提心我皆知此心與阿耨多羅三藐三菩提得作因緣何況聞是首楞嚴三昧能以淨心發阿耨多羅三藐三菩提當知此人於佛法中已得畢定堅意菩薩白佛言世尊今此惡魔聞說首楞嚴三昧為解縛故發菩提心亦得具足佛法因緣耶佛言如汝所說惡魔以聞是三昧福德因緣及發菩提心因緣故於未來世得捨一切魔事魔行魔諂曲心魔衰惱事從今以後漸漸當得首楞嚴三昧力成就佛道堅意菩薩謂惡魔言如來今已與汝授記魔言善男子我不以清淨心發阿耨多羅三藐三菩提如來何故與我授記如佛言曰從心有業從業有報我自無心求菩提道如來何故與我授記時佛欲斷眾會疑故告堅意言菩薩授記凡有四種何謂為四有未發心而與授記有適發心而與授記有密授記有得無生法忍現前授記是謂為四惟有如來能知此事一切聲聞辟支佛所不能知廣如經說爾時魔界行不汙菩薩所化天女令發阿耨多羅三藐三菩提心者各以天華散於佛上白佛言世尊我等不樂密得授記我等願得無生法忍現前授記惟願世尊於今與我授阿耨多羅三藐三菩提記佛時微笑口出種種妙色光明照諸世界還後頂入阿難白佛言世尊何因故笑佛告阿難汝今見二百天女合掌敬禮如來者不已見世尊阿難是諸天女已曾於昔五百佛所深種善根從是已去當復供養無數諸佛過七百阿僧祇劫已皆得成佛號曰淨王阿難是諸天女命終之後得轉女身皆當生於兜率天上供養奉事彌勒菩薩爾時惡魔聞諸天女得授記已白佛言世尊我今自於所有眷屬不得自在以聞說是首楞嚴三昧故況餘聞者若人得聞首楞嚴三昧即得畢定住佛法中爾時天女以無怯心語惡魔言汝弗大愁我等今者不出汝界所以者何魔界如即是佛界如魔界如佛界如不二不別我等不離是如魔界相即是佛界相魔法界佛法界不二不別我等於此法相不出不過魔界無有定法可示佛界亦無定法可示魔界佛界不二不別我等於此法相不出不過是故當知一切諸法無決定無決定故無有眷屬無非眷屬爾時惡魔憂愁苦惱欲還天上魔界行不汙菩薩謂惡魔言汝欲何去魔言我今欲還所住宮殿菩薩謂言不離此眾即是汝宮殿爾時惡魔即自見身處本宮殿菩薩語言汝見何等惡魔答言我自見身處本宮殿好林園池是我所有菩薩語言汝今可以奉上如來魔言可爾適作是語即見如來聲聞菩薩一切大眾皆在其中說首楞嚴三昧爾時阿難語惡魔言汝得大利能以宮殿施佛令住魔言是魔界行不汙菩薩恩力所致堅意菩薩白佛言世尊是魔界行不汙菩薩住首楞嚴三昧神力自在乃如是乎佛言如爾所說今此菩薩住是三昧能以神力隨意自在示現一切行魔界行而能不為魔行所汙與諸天女現娛樂而實不受婬欲惡法是善男子住首楞嚴三昧現入魔界而身不離於佛會現行魔界遊戲娛樂而以佛法教化眾生觀世音菩薩化面然餓鬼緣燄口經云爾時世尊在迦毗羅城尼俱律那僧伽藍所與諸比丘并諸菩薩無數眾生周帀圍遶而為說法爾時阿難獨居靜處一心繫念即於其夜三更之後見一餓鬼名曰面然住阿難前白阿難而後三日汝命將盡即便生此餓鬼之中是時阿難聞此語已心生惶怖問餓鬼言我此灾福作何方計得免斯苦爾時餓鬼報阿難言汝於晨朝若能布施百千那由它恒河沙數餓鬼并百千婆羅門及仙人等以摩伽陀國斛各施一斗飲食并及為我供養三寶汝得增壽令我離於餓鬼之苦得生天上阿難見此面然餓鬼身形羸瘦枯燋極醜面上火然其咽如針頭髮髼亂毛爪長利身如負重又聞如是不順之語甚大驚怖身毛皆竪即從座起疾至佛所五體投地頂禮佛足身心戰慄而白佛言救我世尊救我善逝過此三日命將終盡昨夜見一面然餓鬼而語我言汝於三日必當命盡生餓鬼中我即問言以何方計得免斯苦餓鬼答言汝若施於百千那由它恒河沙數餓鬼及百千婆羅門并諸仙等飲食汝得增壽世尊我今云何得免此苦爾時世尊告阿難言汝今弗怖有異方便令汝得施如是餓鬼諸婆羅門及仙等食弗生憂惱佛告阿難有陀羅尼名曰一切德光無量威力若有誦此陀羅尼者即成已施俱胝那由它百千恒河沙數餓鬼及六十八俱胝那由它百千婆羅門并諸仙等前各有摩伽陀斛四斛九斗飲食佛告阿難我於前世曾為婆羅門時於觀世音菩薩及世間自在德力如來所受此陀羅尼我當以此陀羅尼力便得具足施於無量無數餓鬼及婆羅門并仙等食以我施諸餓鬼食故捨離此身得生天上阿難汝今受持此陀羅尼當自護身即說呪曰那麼薩縛怛它揭多縛路枳帝唵三㕹囉三囉虎吽佛言阿難若欲作此施食法者先取飲食安置淨盤器中誦此陀羅尼呪呪食七遍於門內立展臂戶外置盤淨地彈指七下作此施已於其四方有百千俱胝那由它恒河沙數餓鬼於一一餓鬼前各有摩伽陀斛四斛九斗飲食如是鬼等遍皆飽滿是諸餓鬼喫此食已悉捨鬼身盡得生天復言阿難若比丘比丘尼優婆塞優婆夷若能常誦此陀羅尼并奉飲食即為具足無量功德命得延長即成供養百千俱胝如來功德顏色鮮潔威德強記一切非人步多鬼等夜叉羅剎并諸餓鬼皆畏是人心不忍見是人即為成就具足大力勤進復言阿難若欲施婆羅門及仙食者當取飲食滿置鉢中誦此陀羅尼呪呪食七遍寫流水中具足奉獻無量俱𦙁百千恒河沙數婆羅門并仙人等喫此食已諸根具足圓滿吉祥各發其願讚歎施人其施食人心得清淨而便疾證梵天威德常修淨行具足成就供養百千俱𦙁恒河沙數如來功德於諸怨敵而常得勝若比丘比丘尼優婆塞優婆夷若欲供養一切三寶應當具辦香華飲食誦此陀羅尼呪呪所施食及香華等二十一遍供養三寶此善男子善女人等具足成就諸天妙供及無上供尊重讚歎一切如來剎土三寶諸佛憶念稱敭讚歎諸天擁護佛言汝去阿難當自護身并及廣為諸眾生說令諸眾生成就具足無量功德所生之世常值百千俱胝諸佛第三相似即性惡法門舍利弗尊者降六師緣賢愚經云外道六師聞如來欲來舍衛國往白國王言長者須達買祇陀園欲為瞿曇興立精舍聽我徒與共角術沙門得勝便聽起立若其不如不得起也王召須達而問之言今此六師云卿買園欲為瞿曇起立精舍來共沙門弟子較其技術若得勝者聽立精舍苟其不如便不得起須達歸家著垢膩衣愁惱不樂時舍利弗明日時到著衣持鉢至須達家即問之曰何故不樂須達具答此六師輩出家來久精誠素有所學技術無能及者我今不知尊人技藝能與角不舍利弗言正使此輩六師之眾滿閻浮提數如竹林不能動吾足上一毛欲角何等自恣聽之須達歡喜更著新衣沐浴香水等即往白王我以問之恣聽其意王告六師今聽汝等共沙門角術六師宣告國人却後七日當於城外與沙門角術舍衛國中十八億人時彼國法擊皷會眾若擊銅皷八億人集若打銀皷十四億人集若擊金皷一切皆集七日期滿至平博處推擊金皷一切皆集六師徒眾有三億人是時人民悉為國王及其六師聚設高座爾時須達為舍利弗而施高座時舍利弗在一樹下入諸禪定而作是念此會大眾習邪來久憍慢自高艸芥群生當以何德而降伏之思惟是已即立誓言若我無數劫中慈孝父母敬尚沙門婆羅門者我初入會一切大眾為我作體六師見眾已集而舍利弗獨未來到便白王言瞿曇釋子自知無術眾會既集怖畏不來王告須達角時已到佛弟子宜來談論時須達至舍利弗所長跪白言大德大眾已集願來詣會時舍利弗從禪定起更正衣服以尼師壇著左肩上徐詳而步如師子王往詣大眾是時大眾及其六師忽然起立如風靡艸不覺作禮時舍利弗便昇須達所敷之座六師眾中有一弟子名勞度荖善知幻術於大眾前呪作一樹自然長廣蔭覆眾會枝葉茂華果各異眾人咸言此變乃是勞度荖所作時舍利弗便以神力作旋嵐風吹拔樹根倒著於地碎為微塵眾人皆言舍利弗勝復作一池其池四邊面皆以七寶池水之中生種種華舍利弗又作一大六牙白象其一一牙上有七蓮華一一華上有七玉女其象徐詳往詣池邊并含其水池即時滅復作一山七寶莊嚴眾池樹木華果茂盛舍利弗又化作金剛力士以金剛杵遙用指之山即破壞無有遺餘復作一龍身有十頭於虗空中雨種種寶雷電震地驚動大眾舍利弗又化作一金翅鳥王擘裂噉之復作一牛身體高大肥壯多力觕脚利角跑地大吼奔突來前舍利弗又化作師子分裂食之復變其身作夜叉鬼形體長大頭上火然自赤如血四牙長利口目出火騰躍奔趣時舍利弗自化身作毗沙門王夜叉恐怖即欲退走四面火起無有去處惟舍利弗邊涼冷無火即時屈伏五體投地求哀脫命辱心已生火即還滅眾咸唱言舍利弗勝勞度差不如舍利弗身昇虗空現四威儀作十八變作是變已還攝神足坐其本座時會大眾見其神力咸懷歡喜時舍利弗即為說法隨其福行各得道迹六師徒眾三億弟子於舍利弗所出家學道目連現二神足力降二龍王緣降龍經云佛命長者阿那邠坻當行布施即起長跪叉手白佛願佛眾僧明日降神到舍欲設麤飯佛默然受佛告諸比丘明早當上天投日中下會邠坻舍飯佛以明旦與諸比丘如彈指頃即昇虗空時有羅漢名曰私檀即正衣服於虗空中白佛言我數上天未曾闇冥如今佛言有兩龍王大瞋吐霧是故冥闇復有羅漢名曰受波即白佛言余欲止之佛言此二龍大有威神汝往必當興惡吐水沒殺人民蠕動之類目連白佛我欲往諫佛言大善目連即到龍所龍見目連即口出煙須臾出火圍目連一重目連以道意亦化出火圍龍三重復變身入龍目中左入右出右入左出如是次第從耳鼻入出或飛入其口龍謂目連在其腹中矣目連復變身遶龍十四重以身勑兩龍龍大恐怖毛扇海水動須彌山佛遙告目連此龍尚能吐水沒殺天下人汝且慎之目連白佛我有四禪神足常信行之我能取是須彌山及兩龍著於掌中挑擲它方又能以手撮磨須彌山令碎如塵令諸天人無覺知者兩龍聞之即便降伏目連還復沙門龍化為人稽首作禮悔過目連愚迷狂惑不識尊神觸犯雲霧乞哀原罪兩龍懺悔前受五戒稽首佛足作禮而去優波笈多出家降魔緣阿育王經云舍那婆私於大醍醐山起造寺賣香商主名曰笈多舍那婆私以方便力教化賣香商主令其精進時舍那婆私獨入其家笈多問言聖人何故獨無弟子我樂在家愛五欲樂不欲出家若我生兒當隨長老乃至笈多生兒名阿波笈多至其長大舍那婆私往至笈多所語言汝先有願若我生兒當與長老今已生兒汝當聽其隨我出家笈多言我今惟有一兒若第二兒生當與長老乃至第二兒生名阿那笈多復從其求如是不與第三優波笈多亦從其求答言我當作誓令優波笈多治生若長若退不得出家不長不退乃聽出家是時魔王令摩偷羅國一切人眾悉買其物令其得利時優波笈多正自賣香時舍那婆私長老語言汝心心法云何為善云何為惡答言不知長老又言若心心法與貪瞋癡相應是名為惡與不貪不瞋不癡相應是名為善是時長老以墨土白土各各為九而語之言若汝黑心起取黑丸若白心起取白丸時優波笈多即依其言心不生善乃至不得一枚白丸如是漸進取丸一分黑丸一分白丸復更思惟半黑丸半白丸次第念善遂不起惡取白丸時摩偷羅國有淫女名婆婆達其有一婢往優波笈多處買香多得其主問言汝於何處得此多香將不偷耶俾言有賈客名優波笈多形色具足言語微妙以法賣物其主聞已起婬欲心復令其婢至優波笈多處汝當語彼云我欲與汝共相娛樂優波笈多答言相見未是其時如是至三猶故不聽時又召長者子往至其所商主從北天竺來將五百匹馬及種種物至摩偷羅國至已問摩偷羅國人此國何處有第一端正女人國人答言有一女人第一端正名婆婆達多商主言我今欲以五百銀錢及種種物往至其處是時婬女貪其物故殺長者子取其身骸置不淨處與其商主共相娛樂是長者子親善知識於不淨處覓得身骸往白國王語言汝可取彼婆娑達多截其手脚及以耳鼻散置野外即如王教是時優婆笈多即便思惟我於本時不樂見之共受五欲今者欲見觀其手足及以耳鼻便往觀之為說偈頌婆娑達多既聞其言深畏生死聞佛功德乃變其意樂於涅槃即便說偈答優波笈多優波笈多說四諦臾觀其身得厭欲界得阿那含果婆婆達多得須陀洹果優波笈多去已未久婆娑達多即便命終生於天上時長老舍那婆私往笈多所語言汝當聽優波笈多隨我出家笈多答言我先有誓今其治生不利不鈍乃聽出家舍那婆私乃以神力令其治生不利不鈍是時優波笈多即自思惟稱量筭計不利鈍舍那婆私更至笈多所而語之言今汝此兒是佛所記我入涅槃百年後當作佛事汝當聽其隨我出家笈多即聽舍那婆私將優波笈多往那哆寺與其出家受具足戒至第四羯磨除一切結得阿羅漢果是時舍那婆私語優波笈多言善男子汝佛所記我入涅槃百年後有比丘名優波笈多當作佛事後當作佛名曰無相如是說法是時魔王於大眾中雨於真珠以亂人心眾人亂故無有一人能見諦者即自思念知是魔王至第二日倍多人來魔王雨金又亂眾心第三日中倍多人來魔雨珠金及作天樂是時眾人未得離欲見色聞聲其心變動不復聽法是時魔王即以華鬘繫優波笈多項乃至優波笈多思惟誰作此事即知是魔優波笈多即生此意世尊何故不教化之即自思惟是我所化佛記於我為無相佛教化人民優波笈多取三死屍一者死蛇二者死狗三者死人以神通力變三死屍以作華鬘往魔王處而繫其項爾時魔王往摩醯首羅及帝釋等三十三天四天王天求為脫死屍而不得脫復往大梵天處大梵語言善男子十力弟子神力所作誰能脫之如大海岸水不能破魔王語言云何教我我於今者當歸誰大梵言汝今速往歸依優波笈多如人於此地墮即於是起是時魔王方知佛子神力為大即便說偈讚佛自貴欲界魔王即捨慢心自說往罪七歲沙彌降外道緣阿育王經云昔阿恕伽王深信三寶常供養佛法僧諸婆羅門外道等皆生嫉妬共相聚集揀選宿舊取五百人皆誦四韋陀典天文地理無不愽達共集議言阿恕伽王一切盡供養剃頭髮人我等宿舊未曾被問當設何方便使彼意迴有一善祝婆羅門語諸婆羅門言諸賢但從我却後七日我當以祝力作摩醯首羅身飛行至王宮門汝等皆當步從我後我能使其大作供養汝等都得諸婆羅門皆共然可到七日頭善祝婆羅門即自祝身化作魔醯首羅於虗空中飛到王門諸婆羅門亦皆侍從到王門頭遣人白王言虗空中有魔醯首羅將四百九十九婆羅門從空來下今在門外餘婆羅門在地而立欲得見王阿恕伽王便喚來前坐於兩廂休上王言小坐共相問訊即語之言魔醯首羅何能屈意故來相見欲何所須答言須飲食王即勑命擎五百案飲食着前魔醯首羅等皆手推言我從生已來未曾食如此食阿恕伽王答言先不約出不知當食何食魔醯首羅等皆同聲言我之所食食剃頭人阿恕伽王即勅一臣往雞末寺語尊者耶奢王宮內有五百婆羅門一自稱言魔醯首羅不知為是人為是惡羅剎請問所以願阿闍黎來為我駈遣使去所使之人是邪見婆羅門弟子到彼眾中情不稱實如王所言以語眾僧阿恕伽王所有五百婆羅門貌狀似人語是羅剎惟作是言正欲得汝沙門作食上座耶奢即語維那鳴椎集僧起辭眾僧言我年老耄我為眾僧當如此事眾僧安隱護持佛法聽我使去第二上座言上座不應去我身無所堪能惟我應去如是展轉乃至沙彌十六萬八千僧中其最下頭七歲沙彌起至眾僧中長跪合掌而作是言一切大僧不足擾動我既幼小不能堪任護持佛法惟願大眾必聽我去上座耶奢極大歡喜手摩沙彌頭言汝應合去使人不待即於先去阿恕伽王言頗有來者不使人答言更相推致令次最下沙彌來王作是言大者羞耻故使小者來使作酧對王聞沙彌來即出門迎坐此沙彌著御座上諸婆羅門皆大瞋恚阿恕伽王大不識別云云沙彌問王言何必見喚答言此魔醯首羅欲得阿闍黎為食沙彌言我年幼小朝來未食王先施我食然後當與彼食王即勅厨宰擎食來與食一案食悉皆都盡如是擎五百案食與皆都未足王復勅厨宰言所有餘食盡持擎來與沙彌得食忽爾都盡問言足未答言未足饑渴如本厨監白王言庫中飲食都盡更無有食沙彌言撮下頭婆羅門將來我欲食之即時噉盡如是悉食四百九十九婆羅門悉皆令盡惟有魔醯首羅極大驚怖飛句虗空欲去沙彌即時座上舉手從虗空中撮頭復噉使盡王即時驚怖見噉諸婆羅門使盡復不噉我不沙彌知王心念即語王言王是佛法檀越終無損滅慎莫驚怕即語王言王能共至雞頭末寺不王言阿闍黎將我上天入地皆當隨從沙彌即時共王到寺王見沙彌所食之食諸眾僧等皆分共食所食五百婆羅門皆剃除鬚髮被著法衣在諸眾僧下行末坐最初食者最在上座魔醯首羅最在行末五百人見王沙彌極生慚愧我等尚不能與此沙彌共戰何況與諸大眾而共捔力猶如鶴尾俟於鑪炭猶如蚊子與金翅鳥觕飛遲疾猶如小兔共師子王觕其威力如此之比不自度量五百婆羅門心生慚愧得須陀洹道摩騰竺法蘭二大尊者降五岳道士緣法本內傳云永平十四年正月一日五岳諸山道士朝正之次自相命曰天子棄我道法遠求胡教今因朝集可以表抗之其表略曰五岳十八山觀太上三洞弟子褚信等六百九十人死罪上言臣聞本上無形無名無極無上虗無自然大道出於造化之前上古同遵首王不易今陛下道邁義皇德高堯舜竊承陛下棄本追末求教西域所事乃是胡神所說不參華夏願陛下恕臣等罪聽與試驗臣等諸山道士多有徹夜遠聽愽通經典從元皇已來太上群錄太虗符祝無不綜練遠其涯極或筞使鬼神吞霞飲氣或入火不燒或履水不溺或白日昇天或隱形不測至於方術無所不能願得與其比較一則聖上意安二則得辨真偽三則大道有歸四則華俗不亂若比對不如任聽重決如其有勝乞除虗妄勅遣尚書令宋庠引入長樂宮以今月十五日可集白馬寺道士等便置三壇壇列開二十四門南岳道士褚善信華岳道士劉正念恒岳道士祖文度岱岳道士焦得心嵩岳道士呂惠通霍山天目五臺白鹿等十八山道士祁文信等各賷靈寶真文太上玉訣三元符錄等五百九卷置於西壇第成子許成子黃子老子等二十七家子書二百三十五卷置於中壇饌食奠祀百神置於東壇帝御行殿在寺南門佛舍利經像置於道西十五齊訖道士等以柴荻和沉檀香為炬繞經泣曰臣等上啟太極大道元始天尊眾仙百靈今胡神亂夏人主信邪正教失踪玄風墜緒臣等敢置經壇上以火取驗欲使開示蒙心得辨真偽便縱火焚經經從火化悉成煨燼道士等相顧失色大生怖懼將欲昇天隱形無力可能禁效鬼神者呼䇿不應各懷慚恧南岳道士費叔才自感而死大傅張衍語褚信曰卿等所試無驗即是虗妄宜就西來真法褚信曰茅成子云太上者靈寶天尊是也造化之作謂之太素斯豈妄乎衍曰太素有貴德之名無言教之稱今子說有言教即為妄也信默然時佛舍利光明五色直上空中旋環如蓋遍覆大眾映蔽日光摩騰法師踊身高飛坐臥空中廣現神變於時天雨寶華在佛僧上又聞天樂感動人情大眾咸悅歎未曾有皆遶法蘭聽說法要并吐梵首歎佛功德亦令大眾稱揚三寶說善惡業皆有果報云道三乘諸相不一又說出家功德其福最高初五佛寺同梵福量司空陽城候劉峻與諸官人士庶等千餘人出家四岳諸山道士呂惠通等六百三十人出家陰夫人王媫妤等與諸宮人二百三十人出家便立十所寺七所城外安僧三所城內安尼傳有五卷略不備載南岳大師降道士緣佛祖統紀云大師初住南岳時九仙觀道士歐陽正則覩山有勝氣謀於眾曰此氣主褐衣法王彼盛則吾法衰矣乃鑿斷岳心釘石為誣蠱事埋兵器於山上因詭奏曰北僧受齊募而為之宣帝遣使考驗初度石橋有兩虎號吼使者驚退次日復進師曰檀越前行貧道當續至越七日度使者尚未至始飛錫而往金陵四門皆見師入使者既至遂同進謁帝坐便殿見師乘空而下梵相異常驚悟其神一無所問以道士誣告罔上令案治之罪當棄市師請曰害人之命非貧道意乞放還山給侍僧眾亦足小懲帝可之敕有司治錢為十四券識道士十四名周回其上封以敕即令隨師還山將行餞以殊禮稱為太禪師思大之名蓋得於此初敕寓棲玄寺甞往瓦官精舍遇雨不濕履泥不污僧立慧暠遇諸塗歎曰此神異人何以至此自是舉朝道俗傾心歸仰大都督吳明徹每親道論欲奉以犀枕未敢言師曰欲與枕便可明徹蓋大驚異師既復還山中說法如故道眾以老病告願奉田數頃充香火用贖老身師曰欲留田當從汝願因名留田莊所賜銕券悉收藏之勒石記其事名曰陳朝皇帝賜南岳思大禪師降伏道士銕券記智者大師華頂降魔緣寺北別峯呼為華頂登眺不見群山暄涼永異餘處大師捨眾獨往頭陀忽於後夜大風拔木雷震動山魑魅十群一形百狀或頭載龍蚢或口出星火形如黑雲聲如霹𮦷倏忽轉變不可稱計圖𦘕所寫降魔等變蓋少小耳可畏之相復過於是而能安心湛然空寂逼迫之境自然散失又作父母師僧之形乍枕乍抱悲咽流涕但深念實相體達本無憂苦之相尋復消滅強輭二緣所不能動明星出時神僧現曰制敵勝怨乃可為勇能過斯難無如汝者既安慰已復為說法說法之辭可以意得不可以文載當於語下隨句明了披雲飲泉水日非喻即便問曰大聖是何法門當云何學云何弘宣答此名一實諦學之以般若宣之以大悲從今已後若自兼人皆吾影響智者大師玉泉山降魔緣大師初至當陽望沮漳山色推藍欲卜清溪以為道場意嫌迫隘遂上金龍池北百餘步有大木婆娑偃蓋中虗如菴乃於其處趺坐入定一日天地晦冥風雨號怒妖恠殊形倐忽千變有巨蠎長十餘丈張口內向陰魔列陳砲矢如雨經一七日了無懼色師憫之曰汝所為者生死眾業貪着餘福不自悲悔言訖眾妖俱滅其夕雲開月明見二人威儀如王長者美髯而豐厚少者冠帽而秀發前致敬曰予即關羽漢末紛亂九州瓜裂曹操不仁孫權自保予義臣蜀漢期復帝室時事相違有志不遂死有餘烈故王此山大德聖師何枉神足師曰欲於此處建立道場以報生身之德耳神曰願哀愍我愚特垂攝受此去一舍山如覆船其土深厚弟子當與子平建寺化供護持佛法願師安禪七日以須其成師既出定見湫潭千丈化為平址棟宇煥麗巧奪人目神運鬼工其速若是師領眾入居晝夜演法一日神白師曰弟子今日獲聞出世聞法願洗心易念求受戒法永為菩提之本師即秉鑪授以五戒於是神之威德照布千里遠迸瞻禱莫不肅敬客曰誠如師引則吾儒黃帝之戰尤成湯之放桀伊尹之放太甲禹王之殛防風氏武王之伐紂孔子之誅少正卯獨不得稱性惡法門歟予對曰以逆犯順以邪干正謂之修惡以順誅逆以正袪邪謂之修善然則尤桀太甲紂防風氏少正卯現世則造三途之因以受征放殛伐之華報將來必墮三途以受剉燒舂磨之果報皆修惡也而聖人以大公至正之道征之放之殛之伐之誅之皆人倫道中之修善也至於歷代帝王或以王師而破逆或殺一夫以定天下或殺千萬人以安百姓皆修善也其若中間容一毫私心以拂乎天理或幸而有天下或不幸而失天下皆修惡也或王道伯道以兼行仁義詐力而雜用則善惡為之混邪正為之淆矣若夫性惡法門譬如轉輪聖王能破一切怨敵亦不有所破者是故一切如來雖示現乎殺而實未甞有所殺不過無量劫來所修慈善根力令一切眾生見如此事而獲乎種種利益矧此道理在昔之世如來之所未甞闡方今之時天台之所未甞弘則此方儒聖烏足以知之而況全性以行之乎
