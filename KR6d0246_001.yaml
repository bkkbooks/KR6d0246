body:
  text: 天台山幽谿沙門傳燈著夫性者理也性之為理本非善惡古今之立論以善惡言者無乃寄修以談性借事以名理猶緣響以求聲緣影以求形性之為理豈善惡之足言哉客有冠儒冠以心佛心者過余幽谿以問之曰聞師台教每以性惡法門為一大旨歸有之乎余對曰有之客曰夫善善惡惡人之常情三教聖人建言立論尊賢疾不肖不啻如好好色常恐其不及如惡惡臭常恐其有餘今台宗學者故以是而立論囿物為善訓人之道安在哉余對曰至理驚人至言恐聽苟以人間區區之訓以疑出世間深玄之理惑耳驚心又何足恠矧此宗立論但云只一具字彌顯今宗以性具善他師亦知具惡緣了他皆莫測何甞定言惡而不言善蓋台宗之言性也則善惡具言修也而後善惡分乃以本具佛界為性善本具九界為性惡修成佛界為修善修成九界為修惡他宗既但知性具善而不知性具惡則佛界有所取九界有所舍不得契合淨名經生死即涅槃煩惱即菩提平等不二之旨故立圓理以破偏宗且欲援九界修惡之人不須轉側以達性惡性惡融通無法不趣任運攝得佛界性善以為直指人心見性成佛妙門正囿物為善訓人之大道從事斯教者所以立言而無畏也客又問曰夫性善之言本出於孟子性惡之言本出於荀子善惡混之言本出於楊子今台宗之言性具而曰其於性也則善惡具其言修也則善惡分豈非兼三家而有之以為超勝之說乎余對曰三子之說各言性之一偏固為聖門之不取然皆即才情以言性非即性以言性也況是即人道才情之間以言之非吾教本具十法界之為性善性惡也恐君於吾道猶有所未深試為約世教而略言之然後約本教詳言之委曲言之廣引證以發明之庶幾知性具法門深有功於圓教大有益於圓修如食乳糜餘無所須如得摩尼不事他求也客曰世教何如余曰觀夫孔聖之著書而罕言性故門人之稱其師曰夫子之文章可得而聞也性與天道不可得而聞也然亦少甞言之曰性相近也習相遠也而未甞以善惡斷至於其孫子思之立論然後而微言之曰天命之謂性率性之謂道修道之謂教又曰喜怒哀樂之未發謂之中發而皆中節謂之和夫子思之謂中非天命之謂性乎和非率性之謂道乎至於論率性之道但曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉故夫聖人之道造端乎夫婦之所能知而極乎聖人之所不能知造端乎夫婦之所能行而極乎聖人之所不能是以天下無不可學而極乎聖人之所不能知是以學者不知其所窮夫如是則惻隱足以為仁而仁不止於惻隱羞惡足以為義而義不止於羞惡性善之義隱而發之者如此亦未甞以善惡斷也後世之為善惡紛紛之論者實始於孟子而孟子之言人之性善皆出於其師子思之書子思之書皆孔聖微言篤論孟子得之而不善用能言其道而不知其所以為言之名舉天下之大而必之以性善之論昭昭乎自以為的於天下使天下之過者莫不欲援弓而射之故孟子之既言性善也而荀子好為異論不得不言人性惡謂桀紂性也堯舜偽也又曰乱天下者子思孟軻也意其為人必剛愎不遜自許太過故喜為異說而不讓敢為高論而不顧荀卿既言性惡矣而楊雄又兼二者而有之曰人之性善惡混修其善則為善人修其惡則為惡人夫論性至於善惡混固已近之矣若曰人皆可以為堯舜非修其善而為善人乎獨不可曰人皆可以為桀紂非修其惡而為惡人乎論者謂楊子不知夫善惡者性之所能之而非性之所能有也且夫言性者安以其為善惡哉夫楊子既以為善惡混矣而韓愈者又取夫三子之說而折之於孔子之論離性以為三曰中人可以上下而上智與下愚不移以為三子者皆出乎其中而遺其上下則中人可以上非孟子之性善耶可以下非荀子之性惡耶可以上下非楊子之性善惡混耶而遺其上智為善之不移下愚為惡之不遷離性為三以為超勝之說不知夫子之言中人可以上下而上智與下愚不移者論才也非論性也然亦不獨愈之言也即天下舉古今之人而言性皆雜乎方以言之是以紛紛而不能一也韓愈之說又不獨此也甚至於離性以為情而合才以為性離性以為情則饑寒之患牝牡之欲皆情也非性也情而非性則必以泊然而無為者為性矣而韓愈每以闢佛老為己任至於言性又不覺不知流入於吾教小乘說中是故其論終莫能通蓋儒之言性與吾佛教異既言善惡矣則所謂情者乃儒所謂性也惟聖人無是無由以為聖而小人無是無由以為惡聖人以其喜怒哀愛惡欲七者御之而之乎善小人以是七者御之而之乎惡豈非善惡者性之所能之而非性之所能有之乎蓋甞原之世之立言有好為私說者則造為異論惟務勝人而全不顧其負處則荀子創為性惡是也有喜為公論者則後之說者理必勝前如孟子既言性善而荀子又言性惡矣則楊子不得不兼二子而有之曰人性善惡混若夫韓子者不過捨楊子之遺餘而折衷乎聖人之成言離性以為三品雖欲勝之不知有離性為情合才為性之失要知四子之說惟楊子人性善惡混為近理蓋善惡之論有性也修也於性之未形固不當以善惡論若以修而觀乎性孰有無體之用異性之修乎是故約修以論性修既有善惡矣而性豈得無之但於修須論乎三義曰才也智也情也若夫子之言中人可以上下者此論人之才能可以為堯舜可以為桀紂爾若曰人皆可以為堯舜而竟為之則賢智也即修善也性苟不具乎善則何以能而何以為則性之具善明矣若曰人皆可以為桀紂而亦竟為之此愚情也即修惡也性苟不具乎惡則何以能而何以為則性之具惡又明矣雖聖人未甞以善惡而明言之若子思者固甞發其義端於中庸矣其曰喜怒哀樂之未發謂之中非以言其性乎發而皆中節謂之和非以言其善乎雖不言惡獨不可曰發而不中節謂之不和非以言其惡乎又曰君子之中庸也君子而時中小人之中庸也小人而無忌憚也時中則善也無忌憚則惡也夫喜怒之和不和莫不自性之所發豈非性之本具善惡乎惟聖人惜未人性之具乎善可以為堯舜為聖人為賢人為君子是以諄諄設教以勸之勉之聖人夫人性之具乎惡可以為桀紂為凡夫為下愚為小人是以諄諄設教以懲之誡之故夫子之於詩與春秋也其始終本末各有條貫正以王化之本始於天下之易行何也蓋天下固知有父子也父子不相賊而足以為孝天下固知有兄弟也兄弟不相奪而足以為悌孝悌足而王道備此固非有深遠而難見勤苦而難行故詩之為教也使人歌舞佚樂無所不至要在不失正焉而已雖然夫子固有所甚畏也一失容者禮之所由廢一失言者義之所由亡君臣之相攘上下之相殘天下大亂未甞不始於此道是故春秋力爭於毫釐之間而深明乎疑似之際截然其有所必不可為也此夫子勸善懲惡之教大略也然則孟子深於詩與春秋者也第發明乎祖父道統之傳而力教人以為善可也至於論性則舉天下之人如此之多而必之以性善之說則不可也宋儒張橫渠又謂有天地之性氣質之性天地之性則性善而無惡氣質之性則有善而亦有惡意言孟子言性善者獨指天地之性也諸子言善惡混者雜指氣質之性也余謂性以不變為義豈有天地之性與氣質之性異哉且人稟天地五行以成形而天地之性亦以賦焉是則天地者體也氣質者用也有體而後有用豈有體獨而用兼乎以此而言則橫渠之言亦非是也客曰世教論性之略已聞命矣出世之教論性差別之義如何余曰吾教差別論者釋迦如來說法四十九年而有五時八教一華嚴時二阿含時三方等時四般若時五法華涅槃時八教者一頓教二漸教三秘密教四不定教此之四教名為化儀如世藥方一藏教二通教三別教四圓教此之四教名為化法如辨藥味但化像四教無別體相乃以化法四教而為其相今於化像四教未暇辨之惟約五時所說化法四教以明性之善惡具與不具第一華嚴時者此時兼別教以明圓教其所兼別雖具明十界若言性具但言具佛界之善不具九界之惡以彼所明真如佛性如雲外月逈出二邊必須斷除九界之惡方顯佛界之善若彼正說圓滿修多羅教則備明十界皆是性具本具九界名為性惡本具佛界名為性善修成九界名為修惡修成佛界名為修善故晉譯華嚴云能隨染淨緣遂分十法界又云心如工畵師造種種五陰一切世間中無不從心造如心佛亦爾如佛眾生然心佛及眾生是三無差別又云若人欲了知三世一切佛應觀法界性一切惟心造第二阿含時即三七日如來於華嚴頓後脫舍那珍御之服着丈六獘垢之衣於十二年中說四阿含經名為漸初惟說小乘三藏之教此教雖有佛與菩薩觀其所證惟破見思證偏空理與二乘同是則破去三界六凡法界出三界外入無餘涅槃寂滅而已界惟有八但云搆造豈論性具十界第三方等時於十二年後八年之中說維摩楞伽楞嚴圓覺等諸大乘經此時彈偏斥小歟大褒圓三根普潤四教並談佛於此時說性具與夫性惡法門處至為周足如淨名經云生死即涅槃煩惱即菩提又云眼耳鼻舌入諸根皆是淨土又云有增上慢者說離婬怒癡名為解脫無增上慢者婬怒癡即是解脫又云六十二見為如來種無行經云貪欲即是道恚癡亦復然如是三法中具一切佛法楞伽經云如來藏為善不善因如是之義散在方等不一而足至於圓覺楞嚴其於性具善惡之旨又極所發明凡此諸經專談性具者皆屬圓頓之教若不及此者乃方等圓教中所對藏通及所對別教而已第四般若時說般若經共二十二年論此時以空慧之水淘汰三乘執情似不談乎性具若曰般若談空八十法門具顯是則正以真空破情而不破法則彼時帶通別二正說圓教一以性具而為之主第五法華涅槃時此時說法華凡經八年說涅槃纔一日半夜合此二經為第五時法而法華者乃如來談性具終圓究竟畢萃之時也蓋如來於前四時為實施權者為此性具一實之道以施不具之三權也至法華開權顯實者開前四時三教不具之權以顯法華圓具之實也廢權立實者廢前四時三教不具之權以立法華圓具之實也至於本門三法莫不皆然是故方便品初如來出定歎權實二智曰諸佛智慧甚深無量其智慧門難解難入及其下文乃曰惟佛與佛乃能究盡諸法實相所謂諸法有如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等正以十法界十如是諸法皆是實相惟佛與佛具足究竟權實二智方能究盡實相之實諸法之權所以經中開人天之權云一低頭一合掌一彈指一散華等皆成佛道開聲聞之權云聲聞聞此法疑網皆已除千二百羅漢悉亦當作佛聲聞領解云我等今者真是聲聞以佛道聲令一切聞我等今者真阿羅漢普於其中應受供養至於調達受記龍女作佛莫非開九界之權顯佛界之實或開修善而究竟乎性善或開修惡而究竟乎性惡惟佛與佛乃能究盡不在茲乎至於涅槃則專談性惡故曰闡提善人二人皆有佛性名為善惡緣因具在彼部不能具引是則欲明如來出世一大事因緣者苟不知性具善惡之旨如無目夜遊何以為直指人心何以為見性成佛苟非天台一宗教觀發明此旨則圓頓教理幾乎絕滅矣虎谿懷則師云只一具字彌顯今宗以性具善他師亦知具惡緣了他皆莫測正此謂也是故欲從事於如來圓頓法門者則性具之道是不可不知而不可不學即弘是道者亦不可不講而不可不廣也故今對君凡立八大科以發明之一真如不變十界冥伏門二真如隨緣十界差別門三不變隨緣無差而差門四隨緣不變差而無差門五因心本具毫無虧欠門六果地融通一無所改門七隨淨圓修全修在性門八隨淨圓證舉一全收門客曰云何名為真如不變十界冥伏門余曰此論諸佛眾生自無始劫前未有識心時而真如妙心不遷不變清淨廣大常住堅凝華嚴稱為一真法界清淨法身法華稱為諸法實相圓覺稱為有大陀羅尼門楞嚴稱為菩提涅槃元清淨體又稱為空如來藏菴摩羅識真如佛性大圓鏡智起信論稱為本覺論云所言覺義者謂心體離念離念相者等虗空界無所不遍常住一相即是如來常住法身依此法身說名本覺而此本覺性具十界五陰實法依報國土十界假名毫無虧欠又復具足三因佛性一正因即法身德二了因即般若德三緣因即解脫德涅槃謂之三因佛性正因法身取其竪窮橫遍義了因般若取其當體照明義緣因解脫取其清淨無染義但此本覺雖具十界依正以未隨緣故冥伏於一性之中未曾彰顯以本具十界依報言之則楞嚴所謂性色真空性空真色水火風空莫不如是清淨本然周徧法界是也以本具十界正報言之則楞嚴所謂性見覺明覺精明見性識明知覺明真識莫不清淨本然周遍法界是也圓覺經則曰善男子此菩薩及末世眾生證得諸幻滅影像故爾時便得無方清淨無邊虗空覺所顯發覺圓明故顯心清淨心清淨故見塵清淨見清淨故眼根清淨根清淨故眼識清淨識清淨故間塵清淨間清淨故耳根清淨根清淨故耳識清淨識清淨故覺塵清淨如是乃至鼻舌身意亦復如是善男子根清淨故色塵清淨色清淨故聲塵清淨香味觸法亦復如是善男子六塵清淨故地大清淨地清淨故水大清淨火大風大亦復如是善男子四大清淨故十二處十八界二十五有清淨彼清淨故十力四無所畏四無礙智佛十八不共法三十七助道品清淨如是乃至八萬四千陀羅尼門一切清淨善男子一切實相性清淨故一身清淨一身清淨故多身清淨多身清淨故如是乃至十方眾生圓覺清淨善男子一世界清淨故多世界清淨多世界清淨故如是乃至盡於虗空圓裹三世一切平等清淨不動善男子虗空如是平等不動當知覺性平等不動四大不動故當知覺性平等不動如是乃至八萬四千陀羅尼門平等不動當知覺性平等不動善男子覺性遍滿清淨不動圓無際故當知六根遍滿法界根遍滿故當知六塵遍滿法界塵遍滿故當知四大遍滿法界如是乃至陀羅尼門遍滿法界善男子由彼妙覺性遍滿故根性塵性無壞無雜根塵無壞故如是乃至陀羅尼門無壞無雜如百千燈光照一室其光遍滿無壞無雜此亦明眾生本有圓覺妙性具十種法界故至果成證得諸幻滅十界事中影像使得性具十界莫不清淨不動遍滿以復真如不變之三德也然則十界即三因也三因即十界也雖然相即而有性善性惡之殊本具九界三因名為性惡本具佛界三因名為性善而此十界善惡三因既居於一性之中即之彌分派之常合華嚴稱為一微塵中具足大千經卷首楞嚴稱為擣萬種香為丸若燒一塵具足眾氣淨名稱為入此室者惟聞諸佛功德之香大集稱為如人入海浴已用諸河之水即此義也恐於此義未了復示之圖俾讀此書者觀像以得意焉真如不變十界冥伏之圖客曰云何名為真如隨緣十界差別門余曰前引華嚴能隨染淨緣具造十法界者正以法界圓融之體真如不變之性如君子不器善惡皆能圓頓教旨無功用道極要緊處全在此能之一字上建立若它別教所宗但中佛性惟具善而不具惡其於文經為善之事或者能之若於武緯征伐之事則不能之何足以𫁉才無不具藝無不就成德之士哉若圓頓教旨所明真如不變之體既具十界善惡之性故未隨緣時則居然不變若隨緣時而有十界染淨之用謂能隨染緣造九法界隨淨緣造佛法界十種法界既是性具又是能事惟彰己能何過之有非比淳善之人一切惡事本非所能被惡人逼強令作惡慮其名德俱喪則慚恧無地斯為過矣然此一門宜分因果因論方修果論感報方修之因復有二種一起念名造二搆作名造起念名造者如世人日用根塵相對凡起一念必屬一界一界生起名事造九界冥伏為理具以冥伏故不有以現起故不無全造而具故不有而恒有全具而造故不無而恒無不有不無實相理顯故善觀一念者三智一心中得矣二搆作名造者依此真如所起一念漸漸增長搆造染淨二因成業性故現起冥伏義同上說是故能善觀一心為界者三智亦一心中得矣果論感報者約三世論方修之因若在過去則感報之果在現在若方修之因在現在則感報之果在未來又方修之因有轉不轉感報之果有定不定轉則不定不轉則定如一念貪心起為地獄因若能改格前非慚愧懺悔或轉為人天或轉為四聖在其用心勵行之不同下當列圖具明其相使閱者有所照非成是焉真如隨緣十界差別之圖佛界現起九界冥伏之圖一佛法界者慈雲大師法界圖說云若人因讀圓滿修多羅及聞善知識所說起淨信心信己一念三道之性即三德性苦道即法身煩惱即般若結業即解脫法身究竟般若清淨解脫自在一究竟一切究竟般若解脫亦究竟一清淨一切清淨法身解脫亦清淨一自在一切自在法身般若亦自在即一而三即三而一非縱非橫亦非一異法身常住餘亦常住樂我淨亦如是是則常樂四德祕密之藏遍一切處一切諸法悉是佛法既信是已以境繫心以心繫境心境念念相續不斷必見法性設未相應當依一實無作四諦起四大誓無所求中吾故求之依前苦道即苦諦發一誓願未度者令度煩惱及業即集諦發一誓願未解者令解苦通即法身即是滅諦發一誓願未涅槃者令得涅槃煩惱即菩提即是道諦發一誓願未安者令安四弘不入當巧安心止觀如是次第具修十法必入五品六根及分證位名佛法界釋曰若約佛界論方修之因轉不轉感報之果定不定者佛果既是究竟三身則惟是定無不定義若方修之因二種中正以佛界現起則九界冥伏於一性之中隨外熏緣強弱不同如初起一念佛界之心名造居凡夫不定聚者人分兩品一者若人發佛界心已其志堅固念念在道一入永入此則更無退轉二者是人雖始發心求佛然而立心不固弘誓非堅或逢逆境而退為偏乘或遇順境而即興凡念人天善道逐境漂流惡道三途逢緣墮落起念之造既然搆作之修亦爾不退轉者如善財南求常啼東請割內貿鴿至死而不退投身喂虎委骨而無移以進例退應亦多人不足為訓故其錄少出耳菩薩界現起九界冥伏之圖二菩薩法界者法界圖說云若觀根塵為迷解本迷故則有十界苦集悟故則有四聖滅道緣此無量四諦起無量誓願未度者令度未解者令解未安者令安未得涅槃者令得涅槃善巧度生慈眼視物所集福業與眾生共如是起一念者名菩薩法界釋曰若約菩薩法界論方修有轉不轉果報有退不退者此中明轉不轉復有進不進退不退二義言不轉者惟修此菩薩道而已轉者復二有轉心為佛道進而不退者有雖轉而不進者果報中復有轉不轉二義轉者別教菩薩登初地破無明惑有轉入圓教二住者此即教行二道雖則不圓至於證道證與圓同是也不轉者則始終三道皆別也然而既登初地則惟進無退故無不退義也若約人論退轉者如舍利弗尊者往劫之先修菩薩道因外道婆羅門乞施其眼菩薩曰眼施何用可乞它物外道曰餘無所需必欲眼爾菩薩未具忍力勉強剜施外道得眼嗔而擲地曰我謂菩薩之眼必香潔清美故來乞之若仍臭穢與庸人何異不須此物以足踐踏而去菩薩曰濁世眾生剛強乃爾無用之物必欲求之得之賤辱真難可度不如舍菩薩道修於聲聞自出生死由是漸退墮為凡夫釋論云舍利弗修菩薩道經六十劫於六心中退又如法華會上諸聲聞眾於塵點劫前大通智勝佛十六王子所同聽法華發無上心修菩薩行有不退者久已作佛有退轉者舍大取小退為凡夫小乘機熟今為二乘直至今生如來更以五時說法而成熟之方得受記當來作佛故知修行佛道與菩薩道俱有退不退異也緣覺法界現起九界冥伏之圖緣覺法界者法界圖說云若根塵念起了之從無明生生故有行行招名色乃至老死三世相續如舞火輪因緣本空幻化不實求自然慧樂獨善寂觀空心重耽住寂定雖得道果不慕化人復有觀物榮落悟世非常聞空得道名為獨覺如是行者名為緣覺法界方修之因轉不轉果報退不退於下聲聞法界中共論聲聞法界現起九界冥伏之圖聲聞法界者法界圖說云若根塵因緣隨有一念依色心故苦由煩惱故集厭苦斷集非對治如何遂依四諦修十六觀三十七品如救頭然由四善根得入無漏四沙門果證二涅槃會偏真理不得佛法不慕化人如獐獨跳不顧後羣如此一念名聲聞法界釋曰若約緣覺聲聞二法界論方修有轉不轉果報有退不退者亦以一界既起九界冥伏於一性之中隨外熏緣強弱性不可定餘義同於菩薩轉不轉中復有進不進退不退二義言不轉者惟修二乘之法而已轉則有二一發心轉為菩薩二發心轉為佛界轉此二界復有二心有一轉之後進而不退者有雖轉而不進者果報復有轉不轉二義不轉者即定性聲聞緣覺是也轉者即藏教二乘人為通教大乘所接或通教為別圓二教所接或從空入假學菩薩法或空入假中修行佛道是也天界現起九界冥伏之圖天法界者法界圖說云若念心起多忻天樂篤其善心希於來報齋戒純淨飯食沙門造立塔寺及佛形像書寫大乘濟惠貧病於十善法止作具修自然成性或關禁六根使六情不蕩六塵不入得欲界禪及色無色定身心寂靜三業調良如此一念名天法界釋曰約天法界論方修有轉不轉亦以一界現起九界冥伏於一性之中隨外熏緣強弱不同或修下天之福而轉為上天或轉為出世間禪或減上天之福而轉為下天轉為人界轉為修羅與夫三途初不可定果報有退不退者不退則長時受天之報或更昇上天或因修欲定未到地定或得初禪二禪三禪四禪等定而進昇上界此則不獨不退兼之有進者也若天福既盡而為人道修羅所謂降德貶墜是也或天福既盡而先世惡種正萌而竟墮三途如頭藍弗利根聰明能伏煩惱得無想定八萬劫天報既盡命終之後墮為飛貍之身或將崩而昇轉其果報免於惡趣生於善道如三十三天五衰相現中陰相起應作猪身帝釋教其修三歸依法得免畜生之報生於舍衛國長者之家聞法入道故逐心生相隨心轉初無定體也人界現起九界冥伏之圖人法界者法界圖說云若其念念以無常立德五戒修身於國惟忠於家惟孝謙損居眾中正存誠推德於人引咎向己尊上恤下給孤濟貧慚愧是壞慈和為性深信三寶崇重三歸精修齊戒建立塔寺但希世樂無升出心貪惜自身戀著眷屬如此一念名人法界釋曰約人界論方修轉不轉果報退不退者亦以一界現起九界冥伏於一性之中隨外熏緣強弱不同復不可定四洲人道中惟此南洲人心黠慧易可化度心極易轉如論方修起念於日用中根塵相對而有念生於十界中必落一界未聞大道者善亦不過於人天惡則墜墮於三途如曰人皆可以為堯舜而竟為之生前不失為人中之大聖死後不失為上界之天曹人皆可以為桀紂而亦竟為之生前則失位而殞身死後必三途之為報豈非人道轉而為人中之聖天中之聖乎故人天六道轉與不轉未始離乎方今日用之一念也其若曾聞大道或淺悟偏乘或深信真如正方修人道也而或轉為出世偏乘或轉為涅槃大道故佛世之得度成道者類是人王宰官長者居士此方之成佛作祖者悉係人中俊傑儒道英豪果報定不定者若將因驗果以果證因貧富貴賤業有前定其或相逐心生報隨業轉亦不可定如報本貧賤苟有一德之格天則轉為富貴者有之身當富貴有一行之失德則轉為貧賤者有之如裴度之還帶宋祁之度蟻皆其事也阿修羅界現起九界冥伏之圖阿修羅法界者法界圖說云若其念念雖好修善布施齋戒而多猜嫌狐疑進退所修福業多為勝他見人修善情多嫉忌貢高我慢珍己輕人欲彼歸從不耐謙損如鴟高飛下視外揚仁義內無實德眾前談論引長於我不循理正不媿賢能如此行心是阿修羅法界釋曰約修羅界論方修與搆作轉不轉果報定不定者亦以一界現起九界冥伏於一性之中隨外熏緣強弱不同若其念念如此立行則定是修羅之因勢不可轉其或心生慚愧改惡遷善則轉為人天善道或聞大道轉為出世間心即不可定其若轉為斯下為畜為鬼為獄既一失念則無惡而不為無趣而不墮也果報定不定者楞嚴經說四種修羅謂胎卵濕化天趣人趣鬼趣畜趣其餘是定非不定惟以護法力乘道入空此種修羅常住如來法會之下既聞大道發迴向改悔心乃乘急戒緩之人也轉入菩薩道佛道難可測量餓鬼法界現起九界冥伏之圖餓鬼法界者法界圖說云若其念念無慚無愧貪求無足慳吝鄙惜不施一毛剋削於人裒歸於我見人布施傍起遮障見人得利心生熱惱性多諂曲常起邪見人前正容屏處放恣破齊犯戒恣貪飲食不信罪福不信因果不信三寶不孝所親是名餓鬼法界釋曰約餓鬼法界論方修與搆作轉不轉果報定不定者正以一界現起九界冥伏於一性之中隨其修力強弱或起或伏性不可定若其念念如此定是餓鬼法界勢不可轉其若心生慚愧改惡遷善則轉為人天善道或聞大道轉為出世間心即不可定若轉為斯下為畜為獄既一失念則無惡而不造無趣而不墮也果報定不定者第此道有神鬼之分神道則楞嚴所謂情少想多輕舉非遠即為大力鬼王飛行羅剎地行羅剎遊於四天所去無礙其中若有善願善心護持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下此亦乘急戒緩之流果報雖定既能聞法護法或轉重報為輕報則不可定也若七情三想沈下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害已無食無飲經百千劫此則定非是不定其若面然鬼王啟如來施食之教雖是觀音現示然非實無以施權非權無以引實矧受如來瑜伽法食者能免多劫之苦而超生善道果報豈有定乎畜生法界現起九界冥伏之圖畜生法界者法界圖說云若其念念耽湎五欲貪多眷屬日增月甚而無厭足曲理枉物斷不以公非法取財動不由義秪圖己利不惻孤貪明負他財魯扈抵突市易負直公行劫奪不忠不孝無賢無愚不信因果不信三寶癡騃無恥現同畜生是名畜生法界釋曰約畜生法界論方修與搆作轉不轉亦以一界現起九界冥伏於一性之中隨其外熏緣強弱性不可定若其念念如此定是畜生法界勢不可轉其若心生慚愧改惡遷善則轉為人天道或聞大道轉為出世間心則不可定也若轉為斯下為地獄趣既一失念則上品十惡誹謗三寶毀菩薩戒等無惡而不為也約果報論定不定者若相遂心生果隨因轉如畜之業報定在屠割以供庖厨亦有轉禍為福者如善鹿王代母鹿以趣王厨王問所以鹿以實對王因自悔向鹿說偈汝為鹿頭人我為人頭鹿從今釋汝去隨意遂水草遂兼惡鹿王所部羣鹿俱得解脫獵狩之難豈非報亦可轉乎又如十千游魚蒙流水長者放生施食說微妙法命終之後生三十三天至光明會上以聞法因緣得受記成佛故六道之中皆有佛力法力慈悲之力轉重為輕化惡為善直至解脫俱不可定也地獄法界現起九界冥伏之圖地獄法界者法界圖說云若人親近邪惡友及性自作惡起增上心念念相續造上品十惡謂殺盜淫妄言綺語兩舌惡罵貪嗔邪見及五逆罪犯四重禁汙梵行人沽酒醉亂不思君父師長恩德橫生熱惱挫抑賢能黨彼不肖破塔壞寺燒壞經像謗毀大乘斷學般若謗無諸佛破戒受施用三寶物偷僧祇物起於外道斷常諸見破正因果三世之法習十二種惡律儀法一屠兒二魁劊三養猪四養雞五捕魚六獵者七網鳥八捕蟒九呪龍十獄卒十一盜賊十二為王捕賊及養蚕等業如是等輩入阿鼻大熱大寒諸大地獄是名地獄法界釋曰地獄法界約方修與搆作二因論轉不轉者亦以一界見起九界冥伏於一性之中隨其造力強弱性不可定若其念念作此地獄之因相續不斷習以成性則不可轉或能慚愧改革一念回心即是善道或照破此地獄惡念為四諦為十二因緣為六度為空假中三諦三觀則轉為出世間眾生心行因倒因起轉與不轉皆不可定如阿闍世王殺父害母身瘡腫熱七日之後當墮地獄受耆婆大臣勸來佛所蒙如來月愛三昧光明所照頓獲清涼身瘡痊愈聞佛說法懺悔心重地獄相滅得無根信此已成之因將墮之果承佛法力承懺悔力承大信力尚能轉地獄界為佛法界況不滅罪生善界乎又如楞嚴經佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至十方窮書無間靡不經歷能以一念將此法門於末劫中開示未學是人罪障應念消滅變其所受地獄苦因成安樂國豈非地獄之因因弘法力亦可轉耶約果報論定不定者若尋常所論因果既入地獄決定受報無不定理若不思謙力懺悔力亦可迴其定果得生善處如仙豫國王所殺五百婆羅門外道竟墮阿鼻地獄而興三念一者知是地獄二者知為仙豫所殺三者知因邪見之罪故墮地獄由此生大慚愧懺悔往業即滅地獄而得生天故知阿鼻地獄全處極聖之自心毗盧身土不逾下凡之一念轉之變之職由乎人苟有重悔重悟變地獄為天堂在頃刻間也
