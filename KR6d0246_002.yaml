body:
  text: 天台山幽溪沙門傳燈著客曰十界隨緣差別之事已聞教矣云何名為不變隨緣無差而差門余曰上文所明十界隨緣差別門能隨染淨緣遂分十法界此中宜確論性善性惡與夫修善修惡之旨性善性惡者真如不變之體也修善修惡者隨緣差別之用也正以真如不變體中具善惡二性故隨緣時有善惡之用是則能隨之性名曰善惡所隨之緣名曰染淨十界善惡之性具足五陰實法名為正報具足國土實法名為依報天台大師於此具明十界十如一界有十如則十界有百如十界各各互具成百法界百法界互具則千如是具論實法一千國土一千假名一千如是三千於真如性中無不具足惟其性本具足故隨染淨緣時有正報依報三千之事乃全真如不變之體而為隨緣之用以無差別而為差別如是等義具在諸大乘圓頓經中若顯示其相則莫過楞嚴彼於七大文中而具明性色真空等義并隨衆生心應所知量隨緣之義地水火風空五大乃十界之依報也見識二大乃十界之正報也今為具引以發明之使深信此宗者有所依憑亦以知台宗所立深契合乎佛旨也先明地大不變隨緣義中如來先約現前可見易明之事而開示之云汝觀地性粗為大地細為微塵至鄰虗塵柝彼極微色邊際相七分所成更柝鄰虗即實空性次明隨緣體虗云阿難若此鄰虗柝成虗空當知虗空出生色相汝今問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗又鄰虗塵柝入空者用幾色相合成虗空若合色時合色非空若空合時合空非色色猶可柝空云何合三明真如性具之理云汝元不知如來藏中性色真空性空真色清淨本然周遍法界如來藏即真如不變之體也性色真空性空真色此指真如不變體中所具一分地大所對一分空大者為言文言性者對相而言蓋有性色有相色有性空有相空相色相空乃十法界隨染淨緣造成色之與空即修善修惡也今指性善性惡之色空而此色空在一性中體恆不二亦無差別與所具三德之性體亦不二無有差別故曰清淨本然周遍法界清淨即地大中般若德亦名真諦本然即地大中解脫德亦名俗諦周遍法界即地大中法身德亦名中道第一義諦四明隨緣之義云隨衆生心應所知量循業發現與華嚴能隨染淨緣具造十法界義同所隨之緣有心有業心即十法界染淨二心業即十法界善惡二業佛界三智之心名淨心九界三惑之心名染心佛界順性之行名善業九界逆性之行名惡業謂真如不變佛界性善之體能隨佛界淨心造佛界修善之色約其人則持地菩薩是也約正報即法身報身應身微塵相海八萬四千相好八十種好之色是也約依報即常寂光實報無障礙土之色是也又真如不變九界性惡之體能隨九界染心造九界修惡之色約正報即三聖變易生死之色六道分段生死之色是也約依報即實報無障礙土方便有餘土凡聖同居土之色是也至於極惡則阿鼻地獄依報正報莫非其相是則今人道中所有正報六尺之軀所稟地大之相依報山河國土凡有質礙之色英非從真如不變所具性惡之色自無始隨無明塵沙見思三惑染心造人天惡業之所招報故曰隨衆生心應所知量循業發現心即華嚴所謂染心之緣業即人天所造五戒十善之業此之心業比三途惡道名為淨心善業若望出世間四諦十二因緣皆染心惡業矧佛法界三智淨心六度善業哉次明火大不變隨緣義中如來先約現前可見易明之事而開示云火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火次明隨緣其體本虗云阿難名和合者如我與汝一千二百五十比丘今為一衆衆雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻羅迦葉波種乃至阿難瞿曇種姓阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為從日來阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有三明真如性具之理云汝猶不知如來藏中性火真空性空真火清淨本然周遍法界如來藏即真如不變之體也性火真空性空真火此指真如不變體中所具一分火大所對一分空大者為言文言性者亦對相而説蓋有性火有相火有性空有相空相大相空乃十法界隨染淨緣造成空之與火即修善修惡也今指性善性惡火之與空此火即真空此空即真火是則性火即真空性空即真火故往復言之而曰性火真空性空真火而此空火在一性中體恆不二亦無差別即與所具三德體亦不二亦無差別故曰清淨本然周遍法界清淨即火大中般若德亦名真諦本然即火大中解脫德亦名俗諦周遍法界即火大中法身德亦名中道第一義諦既曰清淨則此火大在一性中本無汙染者也既曰本然則此火大在一性中本非造作者也既曰周遍法界則此火大在一性中本來絶待者也四明不變隨緣之義云隨衆生心應所知量循業發現與華嚴能隨染淨緣具造十法界義同所隨有心有業心即十法界染淨一心業即十法界善惡二行佛界三智之心名淨心九界三惑之心名染心佛界順性之行名善業九界逆性之行名惡業謂真如不變佛界性善能隨淨心善業之緣造佛界修善之火約其人則烏芻瑟摩是也約正報則佛之慧日光明圓照法界日月諸天戢斂重曜約依報則無量香雲為光明臺七寶樓閣常有光明皆其事也又真如不變九界性惡能隨染心惡業之緣造九界修惡之火約正報則身中諸冷暖氣發而為煩惱火氣息如煙為障熱為痟渴約依報則日月光明林木煙焰至於修惡之極則火龍火蛇火麟火鼠諸餓鬼等受氣猛火常被燒然至於八熱地獄上火徹下下火徹上東西交徹歷劫燒然依報則極至於劫火所燒上至初禪世界所有悉為煨燼莫非如來藏真如不變性善性惡能隨染淨緣所造之火故曰隨衆生心應所知量單心不立獨業難成既有染淨心必有善惡業故曰循業發現三明水大不變隨緣義中先約現前可見易明之事而開示之云阿難水性不定流息無恆如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月畫手執方諸承月中水二明隨緣體虗云阿難此水為復從珠中出空中自有為從月來阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降若從珠出則此珠中常應流水何待中宵承白月晝若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行汝更諦觀月從天陟珠因手執承珠水盤本人敷設水自何方流注於此月珠相遠非和非合不應水精無從自有三明真如性具之理云汝尚不知如來藏中性水真空性空真水清淨本然周遍法界如來藏即真如不變之體也性水真空性空真水此指真如不變體中所具一分水大所對一分空大者為言文言性者亦對相而説蓋有性水相水性空相空相水相空乃十法界隨染淨緣造成空之與水即修善修惡也今指性善性惡空水此水乃真水此空乃真空是則性水即真空性空即真水故往復言之而曰性水真空性空真水而此空水在一性中體恆不二亦無差別即與所具三德體亦不二亦無差別故曰清淨本然周遍法界清淨即水大中般若德亦名真諦本然即水大中解脫德亦名俗諦周遍法界即水大中法身德亦名中道第一義諦既云清淨則此水大本無汙染者也既云本然則此水大本無造作者也既云周遍法界則此水大本來絶待者也四明不變隨緣之義云隨衆生心應所知量循業發現與華嚴能隨染淨緣具造十法界義同所隨有心有業心即十法界染淨二心業即十法界善惡二行佛界三智之心名淨心九界三惑之心名染心佛界順性之行名善業九界逆性之行名惡業謂真如不變佛界性善能隨淨心善業之緣造佛界修善之水約其人則水天如來月光童子是也約正報則入地如水履水如地咽喉津液得味中上味約依報則也流入德具七寶色皆悉柔軟澡浴清淨隨意淺深水流光明常演妙法鳧鴈鴛鴦和鳴哀雅四院繞梁宣暢大乘又真如不變九界性惡能隨染心惡業之緣造九界修惡之水約正報則大小便利膿血津液約依報則雨露霜雪江河淮海溪澗溝壑一切諸水至於極惡則地獄中灰河血池八寒凍裂又至於極惡則世界將壞水災難起浩浩漾漾齊於二禪孟子曰人性之善也猶水之就下也人無有不善水無有不下孟子此説但知水之相也未知水之性也但知水之修惡也而未知水之修善也曷為水之性如經所謂性水真空性空真水清淨本然周遍法界當其水之在性也如此則何分上下之與東西如目為太陰之精當月之光明行於太空之時則自西自東自南自北自上自下無斯而不在求水者手執方諸承月中水一處執珠一處水出遍法界執遍法界生生滿世間寧有方所然則水之為性豈必流於下乎曷為水之修善如安養世界七寶池中之水從如意珠王之所湧出自下而上流淚花間尋樹上下分一四支此豈孟子激而行之可使在山者乎又如彌勒內院八功德水亦自下而上繞於梁間宣説甚深妙法亦非激之而使乎上也要知世間水之流下修惡中所有水相也既水之修相可以為上而可以為下則水之為性清淨本然周遍法界性具善惡明矣又孟子謂吾善養吾浩然之氣此氣充塞於兩間為地耶水耶火耶風耶空耶獨然耶雜然耶謂之為氣宜其為五大之餘𦦨也然今經之取其易見之七大先發明者猶是修善修惡中之事非所謂性善惡也若夫性色真空性空真色清淨本然周遍法界者必非直兩間六合而已矣水大如此餘大皆然是則依報地水火風空之性莫不清淨本然周遍法界而已具乎性善性惡矣況人身之六根與夫六識心性而不具性善性惡乎第性之善惡與修不同修之善惡則確然有升沉苦樂之異若夫性之善惡體具三德皆不二而二二而不二何升沈苦樂之殊哉四明風大不變隨緣義中先約現前易明之事而開示之云風性無體動靜不常汝常整衣入於大衆僧伽黎角動及傍人則有微風拂彼人面次明隨緣體虗云此風為復出袈裟角發於虗空生彼人面阿難此風若復出袈裟角汝乃披風其衣飛揚應離汝體我今説法會中垂衣汝看我衣風何所在不應衣中有藏風地若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出若風自生被拂之面從彼面生當應拂汝汝自整衣云何倒拂汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和非合不應風性無從自有三明真如性具之理云汝宛不知如來藏中性風真空性空真風清淨本然周遍法界如來藏真如不變之體也性風真空性空真風此指真如不變體中所具一分風大所對一分空大者為言文言性者亦對相而説蓋有性風相風性空相空相風相空乃十界真如隨染淨緣造成空之與風即修善修惡也今指性善性惡之風此風乃真空此空乃真風是則性風即真空性空即真風故往復言之而曰性風真空性空真風而此風空在一性中體恆不二亦無差別即與所具三德體亦不二亦無差別故曰清淨本然周遍法界清淨即風大中般若德亦名真諦本然即風大中解脫德亦名俗諦周遍法界即風大中法身德亦名中道第一義諦既云清淨則此風大本無汙染者也既云本然則此風大本無造作者也既云周遍法界則此風大本來絶待者也四明不變隨緣之義云隨衆生心應所知量循業發現與華嚴能隨染淨緣具造十法界義同所隨有心有業心即十法界染淨二心業即十法界順逆二行佛界三智之心名淨心九界三惑之心名染心佛界順性之行名善業九界逆性之行名惡業謂真如不變佛界性善能隨淨心順行之緣造佛界修善之風約其人則然燈如來流元法王子是也約正報則道風德風周流法界去來坐立終無疲厭約依報則八種清風快悅和暢吹諸寶網及以寶樹出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心九界性惡能隨染心惡業之緣造九界修惡之風約正報則斤轉脈搖血行氣運行住坐臥相待而居約依報則春和夏熱秋肅冬寒倒嶽旋嵐日往月諸又極惡者地獄惡風吹壞國土亡者神識飛墜乘空寒風凍裂諸罪人體成青白蓮華又極至於大惡者則劫數盡時毗藍風起大地吹之粉碎須彌化作微塵上至三禪天中未免風災所壞須知諸力之中風力最大世界成住壞空非風力而莫能主維大地浮幢王剎非風輪而莫能執持日往月來非風力而莫能運行春夏秋冬非風力而莫能生殺行住坐臥非風力而莫能折旋語言談笑非風力而莫能説默思惟擬議非風力而莫能使然是皆性惡之能事修惡之發越也若夫性善修善之風則常住妙明不動周圓既無有生而又何滅既無所住而亦何遷正所謂稱性而修絶待而證者也五明空大不變隨緣義中先約現前可見易明之事而開示之云空性無形因色顯發如室羅城去河遙遠諸剎利種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少次明隨緣體虗云此空為當因土所出因鑿所有無因自生阿難若復此空無因自生未鑿土前何不無礙唯見大地逈無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出若因鑿出則鑿出空應非出土不因鑿出鑿自出土云何見空汝更審諦諦審諦觀鑿從人手隨方轉運土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出三結成空大以均前之四大云若此虗空性圓周遍本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入四明真如性具之理云汝全不知如來藏中性覺真空性空真覺清淨本然周遍法界如來藏真如不變之體也性覺真空性空真覺此指真如不變體中所具一分空大與所具一分覺大以和會之覺大約而言之即根與識也文言性者亦對相為言蓋有性空相空性覺相覺相空相覺乃十界真如隨染淨緣造成空之與覺今指性善性惡之空覺此空乃真空此覺乃真覺是則性覺即真空性空即真覺故往復言之曰性覺真空性空真覺而此空覺在於一性體恆不二亦無差別即與所具三德體亦不二亦無差別故曰清淨本然周遍法界清淨即空大中般若德亦名真諦本然即空大中解脫德亦名俗諦周遍法界即空大中法身德亦名中道第一義諦既云清淨則此虗空本無汙染者也本然則此空大本無造作者也周遍則此空大本來絶待者也立明下變隨緣之義云隨衆生心應所知量阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現即華嚴能隨染淨緣具造十法界所隨有心有業心即十法界染淨二心業即十法界順逆二行佛界三智之心名淨心九界三惑之心名染心佛界順性之行名善業九界逆性之行名惡業謂佛界真如不變善性能隨淨心順行之緣造佛界修善之空約其人則空王如來虗空藏菩薩是也約正報則清淨法身寶覺真空約依報則虗空為座常寂光土此身即土此土即身雖曰修成其實全修證性與性覺真空性空真覺其體冥合又九界真如不變性惡能隨染心逆行之緣造九界修惡之空約菩薩則為但中之空約二乘則為偏真但空約世間禪則非非想處之空約外道則為四禪無想之空約無為教則為晦昧之空約闡提則為不信三世因果謂人死如燈滅撥無罪福之空以至外道六十二見之空斯人因心雖邪執為空死後果報焉能得空三途惡道如遊園觀駝驢豬狗是其行處也六明見大不變隨緣義中先約現前可見易明之事而開云之云阿難見覺無知因色空有如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析次明隨緣體虗云此見為復與明與暗并太虗空為同一體為非一體或同非同或異非異阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時無暗若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成若此見精與暗與明非一體者汝離明暗及與虗空分析見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異從何立見明暗相背云何或同離三元無云何或異分空分見本無邊畔云何非同見暗見明性非遷改云何非異汝更細審微細審詳審諦密觀明從太陽暗從黑月通屬虗空壅歸大地如是見精因何所出見覺空頑非和非合不應見精無從自出三結成見大以均前之四大云若見聞知性圓周遍本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅阿難汝性沈淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異四明真如性具之理云汝曾不知如來藏中性見覺明覺精明見清淨本然周遍法界如來藏真如不變之體也性見覺明覺精明見此指真如不變體中所具一分見大所具一分識大以和會之文言性者乃對相為言蓋有性見相見性覺相覺相見相覺乃十界真如之性隨染淨緣造成見之與覺今指性善性惡之見覺此見乃真見此覺乃真覺是則性見即覺明覺精即明見故往復言之曰性見覺明覺精明見而此見覺體恆不二亦無差別即與所具三德體亦不二亦無差別故曰清淨本然周遍法界清淨即見大中般若德亦名真諦本然即見大中解脫德亦名俗諦周遍法界即見大中法身德亦名中道第一義諦既云清淨則此六根本無汙染者也既云本然則此六根本非造作者也既云周遍法界則此六根本來絶待者也五明不變隨緣之義云隨衆生心應所知量如一見根見周法界聽嗅嘗觸覺觸覺知妙德瑩然周遍法界圓滿十虗寧有方所循業發現與華嚴能隨染淨緣具造十法界義同所隨有心有業心即十法界染淨二心業即十法界逆順二行佛界三智之心名淨心九界三惑之心名染心佛界順性之行名善行九界逆性之行名惡行謂佛界真如不變善性能隨淨心順行之緣造佛界修善之見約果人則十方如來窮盡微塵清淨國土無所不矚又九界真如不變隨染心逆行之緣造九界修惡之見諸菩薩等見百千界而阿那律見閻浮提如觀掌中菴摩羅果阿難尊者承佛神力見於初禪得無障礙衆生洞視不過分寸若自其善惡極者為言則慈眼視衆生福聚海無量如怖鴿入於佛眼安然不怖如入三禪初入身子之影猶然驚怖戰栗不安非以聲聞無明猶在殺心未盡耶又如龍子受經於羅漢不令正視於師者以其有見毒在一視於人毒氣攻人肌膚為之銷爍故也七明識大不變隨緣義中先約現前可見易明之事而開示之云阿難識性無源因於六種根塵妄出汝今觀見此會聖衆用目循歷其目周視但如鏡中無別分析汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗次明隨緣體虗云此識了知為生於見為生於相為生虗空為無所因突然而出阿難若汝識性生於見中如無明暗及與虗空四種必無元無汝見見性尚無從何發識若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發若生於空非相非見非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別若無所因突然而出何不日中別識明月汝更審諦微細詳審見託汝睛相推前境可狀成有不相成無如是識緣因何所出識動見澄非和非合聞聽覺知亦復如是不應識緣無從自出三結成識大以均前之六大云若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏阿難汝心粗浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有四明真如性具之理云汝元不知如來藏中性識明知覺明真識妙覺湛然遍周法界含吐十虗寧有方所如來藏真如不變之體也性識明知覺明真識此指真如不變體中所具一分識大對明知覺明以和會之文言性者亦對相為言蓋有性識性覺相識相覺相識相覺乃十界真如之性隨染淨緣造成識之與覺今指性善性惡之識覺此識乃明知此覺乃真覺故往復言之曰性識明知覺明真識而此識覺體恆不二性無差別即與所具三德之性體恆不二亦無差別故曰妙覺湛然遍周法界含吐十方寧有方所妙覺湛然即識大上兼有般若解脫二德亦名真俗二諦遍周法界即識大上法身德亦名中道第一義諦既云妙覺湛然則此六識本無汙染造作者也既云周遍法界則此六識本來絶待者也五明不變隨緣之義云隨衆生心應所知量循業發現即華嚴能隨染淨緣具造十法界所隨有心有業心即十法界染淨二心業即十法界逆順二行佛界三智之心名淨心九界三惑之心名染心佛界順性之行名善業九界逆性之行名惡業謂佛界真如不變性善能隨淨心善業之緣造佛界修善之識即菴摩羅識大圓鏡智妙觀察智平等性智成所作智是也又九界真如不變性惡能隨染心惡業之緣造九界衆生之識約菩薩未斷無明則尚居八識約二乘無明全在正在八識約六道凡夫則八識七識六識五識全在已上所引楞嚴經七大之文皆名真如不變隨緣無差而差之旨自是如來金口誠言非是天台故為臆説信如來則信天台信天台方信如來也客曰不變隨緣無差而差之旨已聞教矣云何名為隨緣不變差而無差余曰君果能信無差而差豈不能信差而無差第膚説易曉髓旨難明欲深是義先須了向所引真如一性之中已具無差而差差而無差之旨蓋以如來藏一性言之尚何差別之有然而藏性之中既具七大之性各各不同能為善不善因則無差而差之義見矣雖復七大自性有異其實同居一性之中此則差而無差之旨見矣惟其一性已具斯旨是故能隨染淨緣具造十法界時則染淨雖異而善惡攸分其實從真如不變體中無差而隨緣差別以此謂之無差而差既不變而隨緣必隨緣而不變是故隨緣造十界時謂之差而無差今具以經中隨緣之義重論於君如火大中明未食之家欲炊㸑時手執陽燧日前求火一處執鏡一處火生遍法界執滿世開起起遍世間寧有方所然而六合之內同一日光獨不得言火性之無差乎遍世界執滿世間起獨不得言無差而差乎然則千處萬處均此一火獨不得言差而無差乎然而火以暖為性冬至陽生井泉生暖者火也春來大地萬彚生機者火也摩頂至踵暖氣周遊者火也眼見生光鼻騰煙𦦨者火也第世人著相火而迷性火自於依正妄生差別起染汙意而分別是非或得此而失彼守一而忘諸彼之性火即真空性空即真火清淨本然周遍法界者當體照明湛然清淨本來成規毫無造作即遮那體周遍法界者豈受汝汙染造作而有方所哉火大如是餘大可知無差而差差而無差之旨盡於是矣客曰妙法之義已領旨矣假以譬喻可得聞乎余曰不變隨緣隨緣不變之喻如來於七大文首先總示之矣今君欲因喻明余當依經氷水之喻約九喻以行之共為十喻一氷水喻二器空喻三波水喻四漚海喻五月水喻六日火喻七風空喻八色空喻九金器喻十陽春喻一氷水喻者如來因阿難疑佛常説和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯佛則示以非和不和之義初示非和合不可云若彼大性體非和合則不能與諸大雜和猶如虗空不和諸色古人云此約真如隨緣不同頑空之性也次示和合不可云若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息古人云此約真如不變不同變化等相也非不和合既不可和合又不可此理幽玄卒難開示故示之譬喻云如水成氷氷還成水此喻真如不變隨緣隨緣不變也蓋水之成氷嚴塞使之然也氷之成水陽春使之然也若非和合者水何因而成氷氷何因而成水若和合者水何和而成氷氷何和而成水不變隨緣隨緣不變如斯而已此喻應取濕性喻七大真如之性水喻佛法界隨緣之相氷喻九法界隨緣之相嚴寒喻染緣陽春喻淨緣隨嚴塞以成氷而濕既無虧隨陽春以成水而濕亦不改喻隨染緣以為九而真如之性不減隨淨緣以成佛而真如之性不增下文廣明七大無非發明此理以喻合法以法合喻不變隨緣無差而差差而無差之義成矣二器空喻者文亦出於本經義稍殊於今義經義因阿難疑見性有舒有卷故如來破云一切世間大小內外諸所事業各屬前塵不應説言見有舒縮譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空不應圓若不定者在方器中應無方空汝言不知斯義所在義性如是云何為在阿難若復欲令入無方圓但除器方空體無方不應説言更除虗空方相所在經義以虗空喻見性以器喻一切世間大小諸塵事業今則借虗空以喻真如不變無差之體借方圓群器喻十界隨緣差別之用如虗空雖無大小方圓不妨隨器不同以成乎大小方圓之空在虗空固無差也在群器故有差也然而在虗空同此空也在群器亦同此空也可喻不變隨緣無差而差隨緣不變差而無差也是則終日不變無差而不妨乎隨緣之差終日隨緣之差不妨乎不變無差不變隨差體用而恆即無差而差一異而常同善觀喻者性善性惡修善修惡無差而差差而無差之旨得矣三波水喻者譬如世間無有不波之水亦無不濕之波在水自分乎動靜之殊在濕固無有波水之異以濕喻真如不變無差之性以水喻隨緣差別之用知水處波處之濕性無殊可以悟修善修惡之真如不異斯則豈惟體用之性恆同亦以見修門之大體不異淨名之生死即涅槃煩惱即菩提之理得矣四漚海喻者經中斥迷己為物云譬如百千澄清大海棄之惟認一浮漚體目為全潮窮盡瀛渤然而漚果非海乎漚果異海乎經但斥人認物為己以小為大若會萬物以為也轉物同如來者知全海以為漚漚還匝海悟全漚以即海海不離漚蓋以漚相而言之持一浮泡而已方彼大海不啻毛剎之相懸能觀漚體者漚相雖小漚體則寬故諸如來於一毛端現寶王剎坐微塵裏轉大法輪蓋得乎此是則海喻真如之體漚喻隨緣之用全海以為漚可喻全真如不變之體以隨緣全漚而在海可喻全隨緣之用而在體千漚兢起不妨無差處以為差一海恬然不妨隨緣而不變能了漚海之喻則不變隨緣隨緣不變無差而差差而無差之旨思過半矣五月水喻者此下四喻出於楞嚴本是於法今借之為喻以顯乎法蓋經文所説乃是用修惡近淺之事以明性水隨緣之義今約喻言故無咎也如經云水性不定流息無恆如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水一處執珠一處水出遍法界執滿法界生生滿世間寧有方所今以空中之月以喻真如不變之體所取之水以喻隨緣差別之用空中月色不妨終日不變以隨緣手中之水不妨終日隨緣而不變是故於空水之喻能了達者則於真不變隨緣隨緣不變之旨得矣六日火喻經云汝觀城中未食之家欲炊㸑時手執陽燧日前求火當知世人一處執鏡一處生火遍法界執滿世間起起遍世間寧有方所今以空中之日喻真如不變之體滿世間火喻隨緣差別之用空中之火不異手中之火手中之火不異空中之火以喻真如不變之性無差而差隨縱變造之用差而無差其旨甚明七風空喻者經云風性無體動靜不常汝常整衣入於大衆僧伽黎角動及傍人則有微風拂彼人面如汝一人微動服衣有微風出遍法界拂滿國土生周遍世界寧有方所今以虗空喻真如不變之體風喻隨緣變造之用空中之風不異拂面之風拂面之風不異空中之風空中之風以喻真如不變之體無差而差拂面之風以喻隨緣變造之用差而無差厥義甚明八色空喻者經云阿難空性無形因色顯發如室羅城去河遙處諸剎利等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少如一井空空生一井十方虗空亦復如是圓滿十方寧有方所此文廣辨空土元無異因與前性色即真空性空即真色同旨是則出土得空空色元同一體空中之空即土中之空土中之空即空中之空空中之空不變土中之空亦不變空中之空既不變隨緣能為土中之空則無差而差井中之空雖隨緣變造其實差而無差以喻真如不變之體無差而差隨緣變造差而無差亦甚分明九金器喻者此取出礦之金不取在礦之金若取在礦之金此則濫同別教但中佛性煩惱異菩提真如隨緣猶為其變今取出礦之金正如君子不器善惡皆能但彰己能何過之有故金之為衆器也雖有佛像生像瓶盤叉釧之殊自其金體觀之則一而無二金體不二可喻真如不變之體衆器差別可喻隨緣變造之用真金不礙衆器衆器不失黃金則真如不變無差而差隨緣變造差而無差之旨成矣十陽春喻者比陽春之發生萬物已實寂然而不動遇有感而遂通是以卉木叢林觸之即發如桃李梅柳感之即芳陽春遍於萬彚不妨無差以為差物物皆具陽春不妨差別以無差以喻真如不變而隨緣隨緣不變無差而差之旨了然差而無差之義不忒矣客曰真如不變隨緣無差而差隨緣不變差而無差之旨聞前法喻已曉然矣云何名為因心本具毫無虧欠門余曰因心者指今在凡夫地慕佛果以修因之心也發心雖然廣大約境猶居陰中即以日用根塵相對隨起一念或善或惡或無記或世間心出世間心即以此念而為所觀之境如此之心屬第六識名為陰心亦名人心言本具者正以此心於十界中必屬一界若起三綱五常之心即是人界若此一界現起名為事造則九界冥伏於一性之中名為理具而此一界具十如是謂據外攬而可別名為人界如是相據內自性不改名為人界如是性人界主質名為如是體能修戒善功能名為人界如是力構造綱常名為人界如是作時習成種名為人界如是因助善具度名為人界如是緣表表威儀丈夫可敬名為人界如是果招生中國富貴王侯名為人界如是報初相為本終窮為末如此十如促居一念了不可得即是無諦雖不可得十法宛然即是有諦皆是佛性一一真常即是中諦名為如是本末究竟等然又具五陰十種如是國土十種如是假名十種如是成三十如是如此一界在一性中與九法界性體融通各各互具是則每一界具十法界成百法界一界十如是百界則千如是歷假名五陰國土成三千如是如此三千但約一番互具而論若番番互具則萬億兆媛不可以頭數而枚舉也既性是三諦三德則此一念三千之法體是法身一一周遍法界故性是般若一一照明如大明在天無幽不燭了無煩惱故常處解脫蕭然纍表了無生死繫縛故如是人心而與佛性無二無別如是解了名為見性如是照見名為成佛天台之言直指人心見性成佛者蓋見乎此成乎此也如是説者名為即修論性非即性成性若即性論性已如前第一真如不變十界冥伏門中説竟雖即修論性與前第一門大體無二無別但前即性論性如即海論海今此門中即修論性如指漚而即海也良由真如不變隨緣造此一念既無差而差故此隨緣一念當體不變差而無差有界千如三千性相即法身即般若即解脫如剖栴檀片片皆香如碎白璧分分皆真如搗萬種香為丸若燒一塵具足衆氣如人入大海浴已用諸河之水又合前十喻則如水之為氷氷還即水如空之投器器不異空如水之為波波仍是水如海之起漚漚體全海乃至如月水如日火如風空如空色如金器如陽春悉不變隨緣隨緣不變無差而差差而無差者也客又問曰前真如不變隨緣門既具論十界依正二報是則身色依正無非性具則隨緣時無不遍造皆可論隨緣不變之旨今但云因心本具惟約心言而身色依正不言何也余對曰今天台家性具圓宗正約色心依正皆性具故則隨緣時無不遍造所造色心依正無不當體隨緣不變故四明祖師云又應了知法界圓融不思議體作我一念之心亦復舉體作生作佛作依作正作根作境一心一塵至一極微無非全體而作既一一法全法界作故趣舉一法即是圓融法界全分既全法界有何一法不具諸法故知法界三德不大一念三德不小剎海三德不多一塵三德不少故華嚴云心如工畫師造種種五陰一切世間中無不從心造如心佛亦爾如佛衆生然心佛及衆生是三無差別今宗正約此旨以釋法華經題之妙法謂法者心佛衆生之三法也妙者三無差別也然雖三皆無差若約近要又莫要於心故天台大師云佛法太高衆生太廣初心為難三無差別觀心則易今約世人近要者為言故獨指心法非身色依正而不具論故知衆生色心依正一念一塵與真如不變之體毫無虧欠也
