body:
  text: 天台山幽溪沙門傳燈著客曰果地圓證一無所改已聞教矣云何名為隨淨圓修全修在性門余曰前明真如隨緣十界差別門中凡分兩義一隨淨緣一隨染緣慈雲圖說其義尚略今欲廣明此義故以因心本具毫無虧缺者重發明之而云圓修者對隨染九界之修不得稱性圓修故也又復應知九界之修亦莫非全性起修一一圓融第迷了不同故謂之圓不圓爾故四明尊者妙宗鈔釋心分垢淨行開善惡云心即迷了二心行即違順二行六道三教迷三德性為三惑染故曰垢心身口諸業違理有作皆名惡行惟圓頓教了三德性離三惑染方名淨心身口諸業順理無作稱為善行故知修之偏圓行之逆順全在了不了上分途蓋事中九法界乃全性惡以起修惡事中佛法界乃全性善以起修善既全性起有何一法不即佛法猶如即波見水即器見空乃至即萬彚以見陽春是故諸圓頓大乘經典即修善以觀性善者少即修惡以觀性惡者多如淨名云生死即涅槃煩惱即菩提生死煩惱修惡也菩提涅槃性惡也修之善惡雖分性之善惡無分教門所謂性惡融通無法不趣任運攝得佛界性善是也又云淫怒癡即是解脫又云六十二見為如來種又云六根皆即淨土又云無離文字以說解脫無行經云貪欲即是道瞋恚亦復然如是三法中具一切佛法無非令修者不須轉側達修惡以即性惡耳又如圓覺楞嚴教極圓頓其中修門亦無非令人即修惡以達性惡文雖不言旨極符契今於圓覺但舉綱要而於楞嚴乃廣引證以發明之圓覺文殊章明如來本起因地云永斷無明方成佛道云何無明一切衆生從無始來種種顛倒妄認四大以為身相六塵緣影為自心相然後以奢摩他檢身歸於四大達身無身相檢心歸於六塵緣影了心無心相乃至云知是空華即無輪轉身心無明幻化修惡也達之本空觀修惡即性惡也故曰知幻即離不作方便離幻即覺亦非漸次若楞嚴經二十五聖各陳圓通亦無非全修惡以即性惡蓋六根六塵六識七大皆六道凡夫修惡邊事惟三乘與偏教所觀或即修惡分入空如來藏之性惡以融通乎性善或即修惡分入不空如來藏之性惡以融通乎性善或全入三種如來藏即修惡觀性惡以融通乎性善其餘分入者不能具引今約烏芻瑟摩等七大菩薩全入者以發明之使從事圓頓者有所適從第一明依火大隨淨圓修全修在性者經云烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲有佛出世名曰空王說多淫人成猛火聚教我遍觀百骸四肢諸冷暖氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔冤佛問圓通我以諦觀身心暖觸無礙流道諸漏既銷生大寶焰證無上覺斯為第一釋曰性多貪欲九界修惡中之最下者乃地獄之因空王如來說多淫人成猛火聚者示其華報有虗勞痰火尫瘵之疾果報有地獄歷劫猛火燒然之苦也教我遍觀百骸四肢諸冷暖氣者正觀修惡之火為性惡之火也神光內礙化多淫心成智慧火者乃觀之既久化修惡之火為性惡之火性惡融通無法不趣任運攝得佛界性善也從是諸佛皆呼召我名為火頭我以火光三昧成阿羅漢心發大願諸佛成道我為力士親伏魔冤正以從火大修惡得悟以火光三昧而作佛事行菩薩道為性惡法門也良由無始從如來藏中性火真空性空真火清淨本然周遍法界三德以為業惑苦三道而此三道即是三因故今可觀修惡之火即性惡之火故曰教我遍觀百骸四肢諸冷暖氣神光內凝化多淫心成智慧火所謂隨緣不變差而無差者是也夫觀身心暖觸無礙流通體真而止也遍觀百骸四肢方便隨緣而止也化多淫心成智慧火恩二邊分別而止也體真成而清淨般若之德復方便成而本然解脫之德證息二邊成而法身之德圓豈非隨淨圓修而全修在性乎第二明依地大隨淨圓修全修在性者經云持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現於世或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直毗舍浮佛現在世時世多饑荒我為負人無問遠近惟取一錢或有車馬被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齊我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸我於法性悟無生忍成阿羅漢回心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一釋曰我於爾時平地待佛者此菩薩以平地為得悟之緣也當平心地則世界地一切皆平者夫平地以身平心以智地為隨緣之幻色心為性色即真空隨緣平地則以一念歷千差不變平心則會千差歸一性歷千差則萬念以紛馳故為煩惱為生死歸一性則一道而坦然故為菩提為涅槃是以平大地則心地反致於不平此所謂無差而差也平心地則世界地一切以皆平此所謂差而無差也故觀之未幾我即心開見身微塵與造世界所有微塵等無差別此則豈惟造世界一切皆平即依正二報之地大亦等無差別一切皆平也苟非全性惡之性色不變隨緣無差而差以為九界依正之色焉能身塵依色等無差別不相觸摩乃至刀兵亦無所觸隨緣不變差而無差哉正以能達修惡之色即性惡之色性惡融通無法不趣任運攝得佛界性善故能塵銷智圓成無上道也以三止言之所謂相在塵域如器中鍠聲出於外禪那法身以為之主雙遮雙照三諦俱觀者也第三明依水大隨淨圓修全修在性者經云月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別我於是時初成此觀但見其水未得無身當為比丘室中安禪我有弟子窺窗觀室惟見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盻而去我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失爾時童子捷來我前說如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初逢無量佛如是至於山海自在通王如來方得己身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一釋曰觀於身中水性無奪者悟性惡之水不二法門也初從涕唾如是窮盡津液精血大小便利身中旋復水性一同觀正報之水修惡即性惡也見水身中與世界外浮幢王剎諸香水海等無差別者相似證依報之水修惡即性惡也未出分段故不得亡身至於山海自在通王如來方得亡身至分真變易方得與十方界諸香水海性合真空無二無別豈非深證性水真空性空真水清淨本然周遍法界乎夫一自如來藏中真如不變性水真空性空真水清淨本然周遍法界隨衆生心應所知量循業發現無差而差為九法界依正二報之水苟非隨緣不變焉能依正二水厥性無奪觀之既久能使性合真空無二無別乎此以全性起修用中道禪那如器中鍠聲出於外者為之主故得水性一味流通得無生忍也第四明依風大隨淨圓修全修在性者經云琉璃光法王子即從座起頂禮佛足而白佛言我憧往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時了覺此群動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中所有蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一釋曰無量聲如來開示菩薩本覺妙明宜從本覺不動之性以觀之今乃觀此世界及衆生身皆是妄緣風力所轉乃即修惡之風觀其隨緣風力差而無差者也夫一自如來藏中真如不變性風真空性空真風清淨本然周遍法界無差別體而隨九界衆生心應所知量以為世界依報之風及為衆生正報之風而有種種差別然而莫非全性以起修全修而在性故可即差別以觀乎無差別故曰我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別此固會風性之無差也若夫會性風真空性空真風清淨本然周遍法界者則曰我時覺了此群動性來無所從去無所至云云不惟見風空性一亦乃了動無所動夫以不動以待乎動了動中有不動者在猶有所待也即動以悟乎來無所從去無所至固無所待也故能逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子非以動寂了無對全修而在性乎第五明依空大隨淨圓修全修在性者經云虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身爾時手執四大寶珠照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一釋曰此菩薩所得無邊身乃觀修惡晦昧之空以為性惡之真空此性惡空與性善空無二法界以法界無邊故身亦無邊又不獨此也即性惡空是性惡色火風水三亦復如是菩薩證此妙空即此而備妙用爾時手執四大寶珠照明十方微塵佛剎化成虗空以表示之此則正顯不惟證虗空之無邊亦證四大性之無邊不惟於空入性惡法門而於四大性惡法門而等入之不惟證五大之無邊亦證十法界五陰實法依報國土之無邊是故又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙善能身入微塵國土廣行佛事得大隨順非以心界融通依正不二一多無礙小大相容妙用現前性體不隔而然乎始從真如不變性空真覺中隨心循業應所知量以為晦昧之空四大之空固無差而差矣今所證空則隨淨圓修全修在性即差別而無差別故曰此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍第六明依識大隨淨圓修全修在性者經云彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓爾時世尊教我修習惟心識定入三摩地歷劫以來以此三昧事恆沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現世尊我了如是惟心識故識性流出無量如來今得授記次補佛處佛問圓通我以諦觀十方惟識識心圓明入圓成實遠離依他及遍計執得無生忍斯為第一釋曰前經明本如來藏性識明知覺明真識妙德瑩然遍周法界者真如不變之體也隨衆生心應所知量循業發現者隨淨心善業則為第九菴摩羅白淨之識隨染心惡業則為菩薩二乘之八識則為六道凡夫之八七六識所謂不變隨緣無差而差也即此經文所謂心重世名好遊族姓者也爾時世尊教我修習惟心識定入三摩地乃即修惡之三識以觀性惡之真如求世名心歇滅無有已破六識七識之遍計執性也乃至得成無上妙圓識心三昧破去八識得證第九真常淨識也莫非悟真如不變無差而差故可即差別而會歸無差既當時全性以為修故可即全修而在性能了達乎此是為依識大隨淨圓修全修而在性也第七明依根大隨淨圓修全修在性者經云大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一釋曰前經雖明根大而義說則以見大而例五根備約六根以明不變隨緣隨緣不變之旨故曰如一見根見周法界聽嗅嘗觸覺觸覺知妙德瑩然遍周法界圓滿十虗寧有方所今且以一見根言之有真見有見精有妄見真見即真如不變之性也即所謂性覺妙明本覺明妙也見精即隨緣之始瞥然晦昧體是無記識精中見分也所謂妄為明覺是也妄見即緣塵分別所謂因明立所所既妄立生汝妄能無同異中熾然成異自無差別而為差別者也此與首卷菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者同第無始與今日之不同耳苟欲直指人心見性成佛正當於此會隨染緣修惡原從無差以為差故可即今差別者以無差體達見精修惡即是性惡蓋見精即識精也真見即菩提涅槃元清淨體也若見見之時見非是見見猶離見見不能及則隨淨圓修全修在性之旨得矣一根如此耳根與餘根皆然即以此而為勢至菩薩以念佛心入無生忍亦無所而不可蓋念佛有念自佛三身者有念它佛三身者有合自它三身同念者若見見之時見非是見能如是見則自性三身俱念如能見屬智則果成報身因中即念報身經云妙菩提路是也所見屬性則果成法身因中即念法身經云清淨實相是也天台大師云菩提智與法性相應相冥相應者如函蓋相應相冥者如水乳相冥如水銀和真金能塗諸色像功德和法身處處應現往是故見見之時見非是見見猶離見見所不及成解脫德至果能成應身豈非見見功夫三身具念乎抑以此而念自佛之法身者而念它佛之法身泯然無跡了罔邊畔自它俱見不隔毫端以此而念它佛報身應身時靡不居吾法性之中無能所絶待對所謂境為妙假觀為空境觀雙忘便是中忘照何曾有前後一心融絶了無踪是也苟微此念焉能以念佛心入無生忍耶眼根如此觀音耳門三昧例然餘人圓通鼻舌身意例然觀根皆此觀識觀塵亦復例照猶如藥王執毒為藥是故能了真如性善性惡不變以為隨緣修善修惡隨緣當體不變者可以拈一莖草為千丈舍那之身舉一微塵可以為西方清泰之國盡大地拈來無非雪山藥王樹也客曰隨淨圓修全修在性門之旨已領教矣云何名為隨淨圓證舉一全收門豫曰隨淨圓證者如上所引七大菩薩各依一大以事圓修至果亦各依一大以為圓證略如月光童子依水悟道至於果證方得亡身與香水海性合真空無二無別豈非隨淨圓證一大乎然而既曰性合真空無二無別是則性色真空性火真空性風真空性覺真空性見覺明性識明知此之文意皆於第三卷一一會通者莫不與水大性合真空無二無別非舉一而全收乎又此七門皆觀修惡以即性惡不但性惡融通無法不趣而任運攝得佛法界性善亦乃性善融通無惡不具而任運攝得九法界性惡故圓修行人至於果成九皆究竟四明尊者謂蛣𧏙等皆須六即判其初後正此意也客又問曰圓頓教旨明真如不變隨緣隨緣不變義亦盡矣蔑以加矣何必定須論乎性具豫對曰天台一家宗旨明隨緣義有隨緣變者別教是也有隨緣不變者圓教是也變與不變正在教中所論具與不具具則隨緣不變屬於圓教隨緣若變正因不具是故判入別教是則隨緣不變之旨全在性具之功那云不必論乎性具客又問曰隨緣不變約具以明此固當然何必定須性具十界乎豫對曰性具之理若不具明十界依正色心昧者但云性具佛界不具九界是則必須破九界以證佛界何以故以九法界非性具故乃但中佛性隨染緣之所搆造如淳善人性不具惡忽被惡人所逼隨緣強作諸惡既非其能故說善人果然為惡苟欲復其良善必須大加翻悔改惡遷善故不足稱為君子不器善惡皆能若圓教人以知性具十界故能隨染緣造於九界如全水為波全水為氷是故一切迷中染惡二法皆性具故但彰己能何過之有以非過故迷中二法當體佛性修中全九界即是本性中九界全修即性名為成佛無別他佛可成又問曰性具明乎十界是則成道之時但成佛果修善性善義已周足何須更立性惡法門之稱豫對曰立此性惡法門事非小小凡有五大因緣一理體本來具足故二照性可以成修故三果地圓證莫非妙法故四起妙用時須施十界故五根性不同攝機須遍故餘之四義前文已具根性不同攝機須遍今當明之凡為二意一明菩薩度生須此法門故二明衆生機緣須此入道故菩薩度生須此法門又有二種一者示現無量不乏此門故二者自利因此即用利生故示現無量不乏此門已如前果地圓現毫無虧缺門中說第二自利因此即用利生今當明之凡二義初引義證二引人證初義證如淨名經說爾時文殊師利問維摩詰言菩薩云何通達佛道答曰若菩薩行五無間而無恚惱至於地獄無諸罪垢至於畜生無有無明憍慢等過至於餓鬼而具足功德行色無色界不以為勝示行貪欲離諸染著示行瞋恚於諸衆生無有恚礙示行愚癡而以智慧調伏其心示行慳貪而捨內外所有不惜身命示行毀禁而安住淨戒乃至小罪猶懷大懼示行嗔恚而常慈忍示行懈怠而勤修功德示行亂意而常念定示行愚癡而通達世間出世間慧示行諂僞而善方便隨諸經義示行憍慢而於衆生猶如橋梁示行諸煩惱而心常清淨示入於魔而順佛智不隨他教示入聲聞而為衆生說未聞法示入辟支佛智而成就大悲教化衆生示入貧窮而有寶手功德無盡示入形殘而具相好以自莊嚴示入下賤而生佛種中具諸功德示入羸劣醜陋而得那羅延身一切衆生之所樂見示入老病而永斷病根超越死畏示有資生而恆觀無常實無所貪示有妻子綵女而常樂遠離五欲淤泥現於訥鈍而成就辨才總持無失示入邪濟而以正濟度諸衆生現遍入諸道而斷其因緣現於涅槃而斷生死文殊師利菩薩能如是行於非道通達佛道釋曰如此經文可以證菩薩以性惡法門而化度衆生通達佛道也於是維摩詰問文殊師利何等為如來種文殊師利言有身為種無明有愛為種貪恚癡為種四顛倒為種五蓋為種六入為種七識為種八邪法為種九惱為種十不善道為種以要言之六十二見及一切煩惱皆是佛種曰何謂也答曰若見無為入正位者不能復發阿耨多羅三藐三菩提心譬如高原陸地不生蓮華卑濕淤泥乃生蓮華如是見無為法入正位者終復不能生於佛法煩惱泥中乃有衆生起佛法耳又如植種於空終不得生糞壤之地乃能滋茂如是入無為正位者不生佛法起於我見如須彌山猶能發於阿耨多羅三藐三菩提心生佛法矣是故當知一切煩惱為如來種譬如不下巨海不能得無價寶珠如是不入煩惱大海則不能得一切智寶釋曰如此經文可以證觀修惡即性惡任運攝得佛界性善可以為如來種也第二引人證者略引三緣初婆須密多女緣華嚴經云善財童子見師子嚬申已復告之言善男子於此南方有一國土名曰險難此國有城名寶莊嚴中有女人名婆須密多汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子頂禮其足繞無數匝殷勤瞻仰辭退而去爾時善財童子大智光明照啓其心思惟觀察見諸法性得了知一切言音陀羅尼門得受持一切法輪陀羅尼門得與一切衆生作所歸依大悲力得觀察一切法義理光明門得充滿法界清淨願得普照十方一切法智光明得遍莊嚴一切世界自在力得普發起一切菩薩業圓滿願漸次遊行至險難國寶莊嚴城處處尋覓婆須密女城中有人不知此女功德智慧作如是念今此童子諸根寂靜智慧明了不迷不亂諦視一尋無有疲懈無所取著目視不瞬心無所動甚深寬廣猶如大海不應於此婆須密女有貪愛心有顛倒心生於淨想生於欲想不應為此女色所攝此童子者不行魔行不入魔境不沒欲泥不被魔縛不應作處已能不作有何等意而求此女其中有人先知此女有智慧者告善財言善哉善哉善男子汝今乃能推求尋覓婆須密女汝已獲得廣大善利善男子汝應決定求佛果位決定欲為一切衆生作所依怙決定欲拔一切衆生貪愛毒箭決定欲破一切衆生於女色中所有淨想善男子婆須密女於此城內市廛之北自宅中住時善財聞是語已歡喜踊躍往詣其門見其住宅廣博嚴麗寶墻寶樹及以寶塹一一皆有十重圍繞其寶塹中香水盈滿金沙布地諸天寶華優鉢羅華波頭摩華拘物頭華芬陀利華遍覆水上宮殿樓閣處處分布門闥窗牖相望間列咸施網鐸悉置幡幢無量珍奇以為嚴飾琉璃為地衆寶間錯燒諸沉水塗以栴檀懸衆寶鈴風動成音散諸天華遍布其地種種嚴麗不可稱說諸珍寶藏其數百千十大園林以為莊嚴爾時善財見此女人顏貌端嚴色相圓滿皮膚金色目髮紺青不長不短不粗不細欲界人天無能與比音聲美妙超諸梵世一切衆生差別言音悉皆具足無不解了深達字義善巧談說得如幻智入方便門衆寶瓔珞及諸嚴具莊嚴其身如意摩尼以為寶冠而冠其首復有無量眷屬圍繞皆共善財同一行願福德大藏具足無盡時婆須密多女從其身出廣大光明普照宅中一切宮殿遇斯光者身得清淨爾時善財前詣其所頂禮其足合掌而住白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能教誨願為我說彼即告言善男子我得菩薩解脫名離貪欲際隨其欲樂而為現身若天見我我為天女形貌光明殊勝無比如是乃至人非人等而見我者我即為現人非人女隨其樂欲皆令得見若有衆生欲意所纏來詣我所我為說法彼聞法已則離貪欲得菩薩無著境界三昧若有衆生暫見於我則離貪欲得菩薩歡喜三昧若有衆生暫與我語則離貪欲得菩薩無礙音聲三昧若有衆生暫執我手則離貪欲得菩薩遍往一切佛剎三昧若有衆生暫升我座則離貪欲得菩薩解脫光明三昧若有衆生暫觀於我則離貪欲得菩薩寂靜莊嚴三昧若有衆生見我嚬申則離貪欲得菩薩摧伏外道三昧若有衆生見我目瞬則離貪欲得菩薩佛境界光明三昧若有衆生抱持於我則離貪欲得菩薩攝一切衆生恆不捨離三昧若有衆生唼我唇吻則離貪欲得菩薩增長一切衆生福德藏三昧凡有衆生親近於我一切皆得住離貪際入菩薩一切智地現前無礙解脫善財白言聖者種何善根修何福業而得成就如是自在答言善男子我念過去有佛出世名為高行其王都城名曰妙門善男子彼高行如來哀愍衆生入於王城蹈彼門門其城一切悉皆震動忽然廣博衆寶莊嚴無量光明遞相映徹種種寶華散布其地諸天音樂同時俱奏一切諸天充滿虗空善男子我於彼時為長者妻名曰善慧見佛神力心生覺悟則與其夫往詣佛所以一寶錢而為供養是時文殊師利童子為佛侍者為我說法令發阿耨多羅三藐三菩提心善男子我惟知此菩薩離貪際解脫如諸菩薩摩訶薩成就無邊巧方便智其藏廣大境界無比而我云何能知能說彼功德行第二無厭足王緣華嚴經云善財童子參普眼長者已復告之言善男子於此南方有一大城名多羅幢彼中有王名無厭足汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子禮普眼足繞無量匝殷勤瞻仰辭退而去爾時善財童子憶念思惟善知識教念善知藏能攝受我能守護我令我於阿耨多羅三藐三菩提無有退轉如是思惟生歡喜心淨信心廣大心怡暢心欣慶心勝妙心寂靜心莊嚴心無著心無礙心平等心自在心住法心遍往佛剎心見佛莊嚴心不捨十力心漸次遊行經歷國土村邑聚落至多羅幢城問無厭足王所在之處諸人答言此王今者在於正殿坐師子座宣布法化調御衆生可治者治可攝者攝罰其罪惡決其諍訟撫其孤弱皆令永斷殺盜邪淫亦令禁止妄言兩舌惡口綺語又使遠離貪瞋邪見時善財奇千依衆人語尋即往詣遙見彼王坐那羅延金剛之座阿僧祇寶以為其足無量寶像以為莊嚴金繩為網彌覆其上如意摩尼以為冠莊嚴其首閻浮檀金以為半月莊嚴其額帝青摩尼以為耳璫相對垂下無價摩尼以為瓔珞莊嚴其頸天妙摩尼以為印釧莊嚴其臂閻浮檀金以為其蓋衆寶聞錯以為輪輻大琉璃寶以為其竿光味摩尼以為齊雜寶為鈴恆出妙音放大光明周遍十方如是寶蓋而覆其上阿那羅王有大力勢能伏他衆無能與敵以離垢繒而繫其頂十千大臣前後圍繞共理王事其前復有十萬猛卒形貌醜惡衣服褊陋執持器杖攘臂瞋目衆生見者無不恐怖無量衆生犯王教敕或盜他物或害他命或侵他妻或生邪見或起瞋恨或懷貪嫉作如是等種種惡業身被五縛將詣王所隨其所犯而治罰之或斷手足或截耳鼻或挑其目或斬其首或剝其皮或解其體或以湯煮或以火焚或驅上高山推令墮落有如是等無量楚毒發聲號呌譬如衆合大地獄中善財見已作如是念我為利益一切衆生求菩薩行修菩薩道今者此王滅諸善法作大罪業逼惱衆生乃至斷命曾不顧懼未來惡道云何於此而欲求法發大悲心救護衆生作是念時空中有天而告之言善男子汝當憶念普眼長者善知識教善財仰視而白之曰我常憶念初不敢忘天曰善男子汝莫厭離善知識語善知識者能引導汝至無險難安隱之處善男子菩薩善巧方便智不可思議攝受衆生智不可思議護念衆生智不可思議成熟衆生智不可思議守護衆生智不可思議度脫衆生智不可思議調伏衆生智不可思議時善財童子聞此語已即詣王所頂禮其足白言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能教誨願為我說時阿那羅王理王事已執善財手將入宮中命之同坐告言善男子汝應觀我所住宮殿善財如語即遍觀察見其宮殿廣大無比皆以妙寶之所合成七寶為墻周匝圍繞百千衆寶以為樓閣種種莊嚴悉皆妙好不思議摩尼寶網羅覆其上十億侍女端正殊絶威儀進止皆悉可觀凡所施為無非巧妙先起後臥軟意承旨時阿那羅王告善財言善男子於意云何我若實作如是惡業云何而得如是果報如是色身如是眷屬如是富贍如是自在善男子我得菩薩如幻解脫善男子我此國土所有衆生多行殺盜乃至邪見作餘方便不能令其捨離惡業善男子我為調伏彼衆生故化作惡人造諸罪業受種種苦令其一切作惡衆生見是事已心生惶怖心生厭離心生怯弱斷其所作一切惡業發阿耨多羅三藐三菩提意善男子我以如是巧方便故令諸衆生捨十惡業住十善道究竟快樂究竟安隱究竟住於一切智地善男子我身語意未曾惱害於一衆生善男子如我心者寧於未來受無間苦終不發生一念之意與一蚊一蟻而作苦事況復人耶人是田能生一切諸善法故善男子我惟得此如幻解脫如諸菩薩摩訶薩得無生忍知諸有趣悉皆如幻菩薩諸行悉皆如幻一切世間悉皆如影一切諸法悉皆如夢入真實相無礙法門修行帝網一切諸行以無礙智行於境界普入一切平等三昧於陀羅尼已得自在而我云何能知能說彼功德行
