body:
  text: 天台山幽溪沙門傳燈著客曰因心本具毫無虧欠既領旨矣果地圓證一無所改其義云何余對曰前門約衆生心法在因本具明毫無虧欠雖與真如之體對論無虧正欲與如來果位對論無差今此門中亦雖與真如不變對論不改正欲與心生對論無差蓋衆生心法根塵念起既具百界千如三千性相即真俗中是故圓修行人之所修者照此不思議境也至於果位圓證者證此不思議境也故荊溪大師云三千未顯同名無明三千既顯同稱常樂四明尊者云又復應知六即之義不專在佛一切假實三乘人天下至蛣𧏙地獄色心皆須六即辨其初後所謂理蛣𧏙名字乃至究竟蛣𧏙以論十界皆理性故無非法界一不可改故名字去不惟顯佛九亦同彰至於果成十皆究竟正以十界真如不變之體而能隨緣故使隨緣造成十界其體不變今論佛果則隨淨緣造成佛法界而真如性中所具十種法界與夫三諦悉皆不變但佛界現起九界冥伏謂之為佛其實所具九界冥伏者毫無所改今為廣引經文明證非虗凡為五意一證成果地圓證十界之性二證成果地圓證三諦之體三證成果地圓起一多之用四證成果地圓起十界之用五證成果地妙用之事一證成果地圓證十界之性者若廣引證諸餘大乘經典説圓證十界其文至多今且近引大衆目前易見之經如大佛頂經如來彰自證中云我以不滅不生合如來藏而如來藏元明心妙即心即空即地水火風即眼耳鼻舌身意即色聲香味觸法即眼識界如是乃至即意識界此則如來至於果位本具六凡法界不失自性也又云即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得此則如來至於極果本具二乘法界不失自性也又云即檀那即尸羅即毗黎耶即羼提即禪那即般剌若即波羅蜜多此則如來至於果位本具菩薩法界不失自性也如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨此則如來至於果位本具佛界方得究竟也以此而觀豈非果地圓證十界之性乎二證成果地圓證三諦之體者而如來藏妙明元心十界俱非正以非則遣情纖塵而不立即十法界皆空般若德也又云而如來藏元明心妙十界俱即正以即則立法萬象森然即十法界皆有解脫德也又云而如來藏妙明心元十界俱離即離非是即非即正以離即俱遣二邊不存非即俱是真俗宛然法身德也而此三諦三德皆不離十種法界而辨豈非因具十界三諦修用十界三觀果證十界三德乎三證成果地圓起一多之用者經云我以不滅不生合如來藏而如來藏惟妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小於一毫端現寶王剎坐微塵裏轉大法輪此正如來藏中性具十界依報一塵正報一毛一色一心無非真如不變之體比隨淨緣而為依正色心之時一毛一塵無非法界今稱性圓證故稱性圓現一即法界乃無量之一無量亦法界乃一之無量以至小亦法界大亦法界一毛之正報亦法界一塵之依報亦法界一毛一塵法界不小無量剎海法界不大不大不小故能毛剎相容一多自在正類漚海器空波濕氷水餘之六喻亦復如是故發真如妙覺明性本地風光了非奇特也四證成果地圓起十界之用者經敘觀音修耳根圓通生滅既滅寂滅現前忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方六道衆生同一悲仰夫上合十方諸佛下合十方六道豈非果位圓證十界之性歟至於從體起用則曰由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土三十二應不出十界經云若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為説法令其解脫此從所證本具佛法界而示現者也經云若諸有學寂靜妙明勝解現圓我於彼前現獨覺身而為説法令其解脫若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為説法令其解脫此從所證本具緣覺法界而示現者也經云若諸有學得四諦空修道入滅勝妙現圓我於彼前現聲聞身而為説法令其解脫此從所證本具聲聞法界而示現者也經云若有衆生欲心明悟不犯欲塵欲心清淨我於彼前現梵王身而為説法令其解脫此從所證本具梵天王法界而示現者也經云若諸衆生欲身自在遊行十方我於彼前現自在天身而為説法令其成就若諸衆生欲身自在飛行虗空我於彼前現大自在天身而為説法令其成就若諸衆生愛統鬼神救護國土我於彼前現天大將軍身而為説法令其成就若諸衆生愛統世界保護衆生我於彼前現四天王身而為説法令其成就若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為説法令其成就此皆從所證本具天法界而示現者也經云若諸衆生樂為人王我於彼前現人王身而為説法令其成就此從所證人法界中至尊而示現者也經云若諸衆生愛主族姓世間推讓我於彼前現長者身而為説法令其成就若諸衆生愛談名言清淨自居我於彼前現居士身而為説法令其成就若諸衆生愛治國土剖斷邑我於彼前現宰官身而為説法令其成就若諸衆生愛諸數術攝衛自居我於彼前現婆羅門身而為説法令其成就若有男子好學出家持諸戒律我於彼前現比丘身而為説法令其成就若有女人好學出家持諸禁戒我於彼前現比丘尼身而為説法令其成就若有男子樂持五戒我於彼前現優婆塞身而為説法令其成就若有女子五戒自居我於彼前現優婆夷身而為説法令其成就若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為説法令其成就若有衆生不壞男根我於彼前現童男身而為説法令其成就若有處女愛樂處身不求侵暴我於彼前現童女身而為説法令其成就此皆從所證本具人界差別示現者也經云若有諸天樂出天倫我現天身而為説法令其成就若有諸龍樂出龍倫我現龍身而為説法令其成就若有藥叉樂度本倫我於彼前現藥叉身而為説法令其成就乃至若乾闥婆阿修羅迦樓羅緊那羅摩呼羅伽人非人等有形無形有想無想樂脫其倫我於彼前皆現其身而為説法令其成就此皆從所證本具天龍八部法界乃至三途惡道無不示現者也下文更明與諸十方三世六道衆生同悲仰故令諸衆生於我身心獲十四種無畏功德以至四不思議莫非圓證十界從體起用之事蓋未嘗有無體之用亦未嘗有無用之體若非衆生因心本具諸佛果地圓證全體起用皆名有作神通焉稱無謀而應將因驗果以果證因性具之理皎然明白也五證成果地妙用之事者如上所引之文證成果上起用具足十界而有性善性惡兩種法門謂之法門者法以軌則為稱門以出入為義謂此性善性惡皆果人度生軌則果人則從此二門出而利生衆生則之此二門入而作佛故稱性善性惡法門然此二門性善則常性惡則變如釋迦如來一代施化無非行善順理之道即以四種佛身説半滿之教皆性善也常道也若夫善不足以化則不得不施乎惡乃如來不得已而然特千常之一變爾性善法門人所共曉事涉多門不能繁引今但以理越常情駭目驚心者略引一二以驗性惡法門之不虗略為四科一究竟性惡法門二分真性惡法門三相似性惡法門四觀行性惡法門一究竟者即釋迦如來五時施化之迹有涉此門者具在大藏未能具檢今略引六緣第一最初成道降魔緣因果經云釋迦如來將成正覺魔王宮殿自然動搖魔王念言瞿曇當成正覺及未成道往壞亂之於是手執弓箭與諸眷屬俱往樹下語菩薩言汝應修轉輪王業捨出家法今若不起我試射汝菩薩怡然不驚不動魔王挽弓放箭停於空中其鏃向下變成蓮華魔王復遣三女白菩薩言仁者至德願侍左右答言汝植小善得為天身不合無常而作妖媚今便可去吾不相須時三天女變成老姥頭白面皺魔王即以軟語誘言汝若不樂人間我捨天位與五欲樂悉將與汝菩薩答言汝先小修施今得為自在天王此福有期要還沉溺非我所須魔曰我之果報是汝所知汝之果報誰復知者菩薩答言惟此地知於是大地六種震動地神涌出而語魔言菩薩昔以頭目髓腦國城妻子象馬珍寶而用布施不可稱計為求無上正真之道是故汝今不應惱亂魔聞怖懼即自思惟我今當更設方便廣集軍衆以力迫脅時諸軍衆忽然來至充滿虗空執戈操劍多頭多目諸惡類形圍繞菩薩四面煙起四海涌沸是諸魔衆各盡威力角目切齒橫飛竪擲菩薩觀之如童子戲空中有神隱身而言菩薩歷劫修習善果欲導衆生云何汝今惱亂導師今日決定樹下成無上道此地乃是過去諸佛金剛之座堪受妙定非汝所摧汝今冥應息憍慢意而奉事之是時魔王聞空中聲即還本宮又雜寶藏經云惡魔波旬將八十億衆欲來壞佛語云汝不急去我擲汝海水佛語波旬汝今先能動此澡瓶然後可能擲我海水波旬不能令動軍衆壞散佛本行經云波旬長子商主即頂禮菩薩求乞懺悔白言我父無智觸忤大聖願得恕亮客問曰魔王以惡意加佛佛未嘗以毫惡向之何足以為性惡余對曰即世尊以惡向之無非慈善根力令彼自然潰散雖謂之惡實非惡也況性之善惡體本融通於彼因善得益謂之性善於惡得益謂之性惡夫惡以不順為義如今之降魔令其箭鏃成花變魔逆境以為順境化諸天女老斃變魔順境以為逆境惱亂其心皆性惡邊事也第二佛化淫女令生厭苦緣觀佛三昧經云佛告阿難我昔夏安居時波羅捺國有一淫女名曰妙意於佛有緣佛與難陀將往淫女舍日日乞食此女於我不曾恭敬但共難陀偏生愛著已經七日女心念言沙門瞿曇若能遣難陀阿難從我所願我當種種供養佛告阿難難陀汝從今日莫往彼村世尊獨至女樓一日至三日放金色光化諸天人此女不悟後日世尊復將阿難難陀在樓下行淫女愛敬二比丘故遙以衆華散佛及二比丘阿難告言汝可禮佛女愛阿難應時作禮佛化作三童子年皆十五面貌端正女見歡喜為化少年投地敬禮白少年言丈夫我今此舍如功德天富貴自在衆寶莊嚴我今以身及以奴婢奉上丈夫可備灑掃若能顧納隨我所願一切供給無所愛惜化人坐床未及食頃女前親近言願遂我意化人不違一日一夜心不疲厭至二日時愛心漸息至三日時白言丈夫可起飲食化人即起纏綿不已女已生厭悔白言丈夫異人乃爾化人告言我先世法凡與女通經十二日爾乃休息女聞此語如人食噎既不得吐又不得咽身體苦痛如被杵搗至四日時如被車轢至五日時如鐵丸入體至六日時肢節悉痛如箭入心女念言我聞淨王子救濟苦人今日何故不來救我作是念已懊惱自責我從今日乃至壽終不貪色欲寧與虎狼獅子惡獸同處一室不受此苦作是語已復起飯食行坐共俱無奈之何化人亦嗔唾云弊惡女廢我事業我今共汝合體一處不如早死父母宗親若來覓我於何自藏我寧自縊死不堪受恥女言斃物我不用爾欲死隨意化人取刀刺頸血汙女身逶迤在地女不能勝亦不得免死經二日青瘀臰黑三日䏺脹四日爛殨大小便利及諸惡蟲迸血諸膿塗漫女身女極惡厭而不得離至五日時皮肉漸爛至六日時肉落都盡至七日時惟有臰骨如膠如漆粘著女身女發誓言若諸天神及與仙人淨飯王子能免我苦我持此舍一切珍寶以用給施作是念時佛將阿難難陀帝釋在前擎寶香爐燒無價香梵王在後擎大寶蓋無量諸天作天伎樂佛放常光照耀天地一切大衆皆見如來詣此女樓時女見佛心懷慚愧藏骨無處取諸白㲲無量衆香褁其臰骨臰勢如故不可覆藏女見世尊即為作禮以慚愧故身映骨上臰骨忽然在女背上女流淚而言如來功德慈悲無量若能令我離此苦者願為弟子心終不退佛神力故臰骨不現女大歡喜為佛作禮白佛言世尊我今所珍一切施佛佛為呪願梵音流暢女聞歡喜應時即得須陀洹道第三降伏曠野鬼神緣涅槃經云善男子如我一時遊彼曠野聚落叢樹在其林下有一鬼神即名曠野純食肉血多殺衆生復於其聚日食一人善男子我於爾時為彼鬼神廣説法要然復暴惡愚癡無智不受教法我即化身為大力鬼動其宮殿令不安所彼鬼於時將其眷屬出其宮殿欲來拒逆鬼見我時即失心念惶怖躃地迷悶斷絶猶如死人我以慈愍手摩其身即還起坐作如是言快哉今日還得身命是大神王具大威德有慈愍心赦我愆咎即於我所生善信心我即還復如來之身復更為説種種法要令彼鬼神受不殺戒即於是日曠野村中有一長者次應當死村人已送付彼鬼神鬼神得已即以施我我既受已便為長者更立名字名手長者爾時彼鬼即白我言世尊我及眷屬惟仰血肉以自存活今已受戒當何資立我即答言後今當勑聲聞弟子隨其修行佛法之處悉當令其施汝飲食善男子以是因緣為諸比丘制如是戒汝等從今常當施彼曠野鬼食若有住處不能施者當知是輩非我弟子即是天魔徒黨眷屬善男子如來為欲調伏衆生故示如是種種方便非故令彼生怖畏也第四以木打護法鬼第五在一山上推羊頭鬼令墮山下第六復於樹頭撲護獼猴鬼第七令護財象見五獅子第八使金剛神怖薩遮尼揵第九亦以針刺箭毛鬼身如來復云雖作如是亦不令彼諸鬼等有殘滅者直欲令彼安住正法故示如是種種方便第四降護財醉象緣涅槃經云善男子我説是慈有無量門所謂神通善男子如提婆達教阿闍世欲害如來是時我入王舍大城次第乞食阿闍世王即放護財狂醉之象欲令害我及諸弟子其象爾時踏殺無量百千衆生衆生死已多有血氣是象嗅已狂醉倍常見我翼從被服赤色謂呼是血而復見趣我弟子中未離欲者四散驅走惟除阿難爾時王舍城中一切人民同時舉聲號哭流淚作如是言怪哉如來今日終沒如何正覺一旦散壞是時調達心生歡喜瞿曇沙門歿滅甚善從今已往真是不現快哉此計我願得遂善男子我於爾時為欲降伏護財象故即入慈定舒手示之即於五指出五獅子其象見已心生怖畏失大小便舉身投地敬醴我足善男子我時手指實無獅子乃是修行慈善根力令彼調伏第五仙豫王殺婆羅門緣涅槃經云我念往昔於此閻浮提作大國王名曰仙豫愛念敬重大乘經典其心純善無有粗惡嫉姤慳吝口常宣説愛語善語身常攝護貧窮孤獨布施精進無有休廢時世無佛聲聞緣覺我於爾時愛樂大乘方等經典十二年中事婆羅門供給所須過十二年施安已訖即作是言卿等今當發阿耨多羅三藐三菩提心婆羅門言大王菩提之性是無所有大乘經典亦復如是大王云何乃令人物同於虗空善男子我於爾時心重大乘聞婆羅門誹謗方等聞已即時斷其命根諸婆羅門命終之後生阿鼻地獄即有三念一者自念我從何處而來生此即便自知從人道中來二者自念我今所生為是何處即便自知是阿鼻獄三者自念乘何業緣而來生此即便自知乘謗方等大乘經典不信因緣為國主所殺而來生此念是事已即於大乘方等經典生信敬心尋時命終生甘露鼓如來世界於彼壽命具足十劫善男子以是義故我於往昔乃與是人十劫壽命云何名殺善男子以是義故菩薩摩訶薩於諸衆生終無奪命善男子汝能所問殺婆羅門時得是地不善男子我時已得以愛念故斷其命根非惡心也善男子譬如父母惟有一子愛之甚重犯官憲制是時父母以怖畏故若擯若殺無有惡心菩薩摩訶薩為護正法亦復如是若有衆生謗大乘者即以鞭撻苦加治之或奪其命欲令改往遵修善法菩薩常當作是思惟以何因緣能令衆生發起信心隨其方便要當為之第六如來因中救賈人緣涅槃經云定光佛時有五百賈人入海求寶有異心者念言我今悉害賈人獨取珍寶時閻浮提有大導師名曰大哀時寐夢中海神語之賈衆之中有一賊欲殺五百伴獨取寶物假令事遂墜地獄中今仁導師當行權變令賈人不死賊不獲罪導師思惟七日無餘方便惟當殺此人若白衆者必皆興怒當共殺之俱隨惡趣設我獨殺我當受罪吾寧自忍百千劫苦不令賈人普被危害復令一賊墜地獄中先為説法令心欣然踊躍臥寐佛言大哀導師因衆賈人興於大哀以權方便害此一賊命終之後生第十二光音天上時大哀者則吾身也以斯方便超千劫生死同船五百賈人斯賢劫中五百佛興者是第二分真即性惡法門論文殊等諸大菩薩神通化現事迹極多今引一二有涉性惡法門者以證非虗廣載大藏實不啻於此也提婆達多惡知識緣昔於定光佛時釋迦為摩納婆就珍寶仙人學學習既成念欲報思自惟貧乏於時耶若達欲嫁女時有須摩提求為女壻聰明有智而形貌醜摩納婆遇見論義須摩提屈在言下耶若達歡喜大賜珍寶以女妻之摩提生忿發誓未來世世常惱為此因緣常觸惱也自是以後經歷六道常相觸惱文多不載調達此世因緣調達此云天熱亦云天授為斛飯王子乃是佛堂弟阿難親兄調達有三十相出家誦六萬法聚滿十二韋陀為利養故往詣佛所求學神通佛不為説令觀無常自可得道復至舍利弗目揵連乃至百弟子所皆不為説神通之法阿難親弟未得他心授與通法調達入山學得五通心念誰作檀越闍世太子有大王相或自變身作象馬寶於王子前抱持歍嗽復至天上取天華天食語王子言我作新佛汝作新王豈不快耶有時變為小兒闍王置之膝上以唾歍其口中後從佛索衆佛呵之曰癡人無知尚不以衆付舍利弗及目犍連等況汝癡人食人涕唾者因茲結恨別搆五法以誘佛衆言五法者一糞掃衣二常乞食三坐食四常露坐五不受鹽及以五味與正理論不同正理云一不受五味二斷肉三斷鹽四不受割截衣五不居聚落邊寺佛在王舍城有因緣集僧調達從座起行五法籌云忍此五法者是毗尼時有五百新學無智捉籌調達語言不須佛及僧便將往伽耶山自共作羯磨時諸比丘以此事白佛佛言癡人消滅善心墜於泥黎一劫莫救身子目連往伽耶山調達告身子曰為衆説法我今背痛便右脅臥目連現通身子説法遂將五百新學還歸佛所臥起失衆而生嗔恨推山壓佛密迹金剛以杵擬之碎石迸來傷佛足指華色比丘尼呵之拳打眼出作三逆罪復教闍世殺父成就害母加行自行教他五逆罪故生身墮入阿鼻地獄報恩經云爾時如來即遣阿難往到地獄問訊提婆達多苦可忍不爾時阿難受如來教至地獄門外問牛頭阿旁言為我喚提婆達多牛頭阿旁言汝問何佛提婆達多過去諸佛皆有提婆達多阿難言我喚釋迦牟尼佛提婆達多爾時阿旁即語提婆達多阿難在外欲得相見提婆達多即言善來阿難如來猶能憐念於我耶阿難言如來遣我問訊苦痛可堪忍不提婆達多言我處阿鼻地獄猶如比丘入三禪樂佛言菩薩摩訶薩修大方便引接衆生其受生死無量大苦不以為患若有人言提婆達多實是惡人入阿鼻獄者無有是處如來爾時即為大衆顯發提婆達多微密妙行大方便時無量百千菩薩得無生法忍無量百千人發阿耨多羅三藐三菩提心無量百千人得須陀洹果乃至阿羅漢虗空神天雨衆天華遍覆大衆作天伎樂放大光明讚言善哉如來所説未曾也一切大衆聞佛説法頭面作禮歡喜而去提婆達多善知識緣法華提婆達多品云爾時佛告諸菩薩及天人四衆吾於過去無量劫中求法華經無有懈倦於多劫中常作國王發願求於無上菩提心不退轉為欲滿足六波羅蜜勤行布施心無吝惜象馬七珍國城妻子奴婢僕從頭目髓腦身肉手足不惜軀命時世人民壽命無量為於法故捐捨國位委正太子擊鼓宣令四方求法誰能為我説大乘者吾當終身供給走使時有仙人來白王言我有大乘名妙法華經若不違我當為宣説王聞仙言歡喜踊躍即隨仙人供給所須采果汲水拾薪設食乃至以身而為牀座身心無倦於時奉事經於千歲為於法故精勤給侍令無所乏爾時世尊欲重宣此義而説偈言我念過去劫為求大法故雖作世國王不貪五欲樂推鐘告四方誰有大法者若為我解説身當為奴僕時有阿私仙來白於大王我有微妙法世間所希有若能修行者吾當為汝説時王聞仙言心生大歡喜即便隨仙人供給於所須采薪及果蓏隨時恭敬與情存妙法故身心無懈倦普為諸衆生勤求於大法亦不為己身及以五欲樂故為大國王勤求獲此法遂至得成佛今故為汝説佛告諸比丘爾時王者則我身是時仙人者今提婆達多是由提婆達多善知識故令我具足六波羅蜜慈悲喜捨三十二相八十種好紫磨金色十力四無所畏四攝法十八不共神通道力成等正覺廣度衆生皆因提婆達多善知識故告諸四衆提婆達多却後過無量劫當得成佛號曰天王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊世界名天道時天王佛住世二十中劫廣為衆生説於妙法恆河沙衆生得阿羅漢果無量衆生發緣覺心恆河沙衆生發無上道心得無生忍至不退轉時天王佛般涅槃後正法住世二十中劫全身舍利起七寶塔高六十由旬縱廣四十由旬諸天人民悉以雜華末香燒香塗香衣服瓔珞幢幡寶蓋伎樂歌頌禮拜供養七寶妙塔無量衆生得阿羅漢果無量衆生悟辟支佛不可思議衆生發菩提心至不退轉佛告諸比丘未來世中若有善男子善女人聞妙法華經提婆達多品淨心信敬不生疑惑者不墮地獄餓鬼畜生生十方佛前所生之處常聞此經若生人天中受勝妙樂若在佛前蓮華化生論曰夫順以逆成善因惡濟譬如火能剋金金非火不煉石能攻玉玉非石不礲是則釋迦如來性善法門究竟圓滿全由提婆達多性惡法門多方造就故法華云由提婆達多善知識故令我具足六波羅蜜慈悲喜捨三十二相八十種好紫磨金色十力四無所畏四攝法十八不共神通道力成等正覺廣度衆生又曰提婆達多却後過無量劫當得成佛號曰天王如來具足十號夫提婆達多果以惡而為之惡則永為惡知識長沉淪三苦海不得受記作佛矣又釋迦如來果視逆而為之逆則不應云由提婆達多善知識故令我具足六波羅蜜等而得作佛矣求其深故苟微性善惡法門則無以闡揚故列於分真性善惡法門之首有以知上讓釋迦下冠文殊也然如來則全性善以起修善以修善而臻極乎性善矣若夫提婆達多者豈不得云全性惡以起修惡以修惡而臻極乎性惡是則提婆達多本迹俱深固不可得而思議者也淨名居士降天魔緣淨名經云佛告持世菩薩汝行詣維摩詰問疾持世白佛世尊我不堪任詣彼問疾所以者何憶念我昔住於靜室時魔波旬從萬二千天女狀如帝釋鼓樂絃歌來詣我所與其眷屬稽首我足合掌恭敬於一面立我意謂是帝釋而語之言善來憍尸迦雖福應有不當自恣當觀五欲無常以求善本於身命財而修堅法即語我言正士受是萬二千天女可備掃灑我言憍尸迦無以此非法之物要我沙門釋子此非我宜所言未訖時維摩詰來為我言非帝釋也是為魔來嬈固汝耳即語魔言是諸女等可以與我如我應受魔即驚懼念維摩詰將無惱我欲隱形去而不能隱盡其神力亦不得去即聞空中聲曰波旬以女與之乃可得去魔以畏故俯仰而與爾時維摩詰語諸女言魔以汝等與我今汝皆當發阿耨多羅三藐三菩提心即隨所應而為説法令發道意復言汝等已發道意有法樂可以自娛不應復樂五欲樂也天女即問何謂法樂答言樂常信佛樂欲聽法樂供養衆樂離五欲樂觀五陰如怨賊樂觀四大如毒蛇樂觀內入如空聚樂隨護道意樂饒益衆生樂供養師樂廣行施樂堅持戒樂忍辱柔和樂勤集善根樂禪定不亂樂離垢明慧樂廣菩提心樂降伏衆魔樂斷諸煩惱樂淨佛國土樂成就相好故修諸功德樂莊嚴道場樂聞深法不畏樂三脫門不樂非時樂近同學樂於非同學中心無恚礙樂將護惡知識樂親近善知識樂心喜清淨樂修無量道品之法是為菩薩法樂於是波旬告諸女言我欲與汝俱還天宮諸女言以我等與此居士有法樂我等甚樂不復樂五欲樂也魔言居士可捨此女一切所有施於彼者是為菩薩維摩詰言我已捨矣汝便將去令一切衆生得法願具足於是諸女問維摩詰我等云何止於魔宮維摩詰言諸姊有法門名無盡燈汝等當學無盡燈者譬如一燈燃百千燈冥者皆明明終不盡如是諸姊夫一菩薩開導百千衆生令發阿耨多羅三藐三菩提心於其道意亦不滅盡隨所説法而自增益一切善是名無盡燈也汝等雖住魔宮以此無盡燈令無數天子天女發阿耨多羅三藐三菩提心者為報佛恩亦大饒益一切衆生爾時天女頭面禮維摩詰足隨魔還宮忽然不現文殊師利菩薩三處度夏緣寶篋經云時大德迦葉語舍利弗我亦曾見文殊師利希有神通舍利弗爾時世尊成佛未久我久出家是時文殊師利童子始初至此娑婆世界從寶王世界寶相佛所來欲見佛釋迦牟尼供養恭敬爾時世尊在舍衛國祇陀林中給孤窮精舍夏坐三月我時不見文殊師利若如來前若衆僧中若於食時若説戒日若僧行次都不見之過三月已臨自恣時乃見其面我即問言文殊師利何處坐夏即答我言大德迦葉我住是舍衛大城波斯匿王後宮一月復一月住童子學堂復一月住諸淫女舍我聞是已心甚不悅即作是念云何當共是不淨人而作自恣我即出堂便擊楗椎欲擯文殊師利童子爾時世尊即告文殊師利童子汝往看是摩訶迦葉今者何故打楗椎也白言世尊我已見之欲擯於我佛語文殊師利童子今可現汝自在神力神通境界令彼聲聞心得清淨勿於汝所生不淨心於時文殊師利童子即入三昧其三昧名現一切佛土文殊師利入三昧已十方各如恆河沙等諸佛世界其中皆有摩訶迦葉頭陀第一悉打楗椎於時世尊即問我言摩訶迦葉汝今何故打於楗椎我言世尊文殊師利自説是言夏三月中住王後宮及淫女舍為擯是故打於楗椎爾時世尊身放光明遍照十方而告我言汝今遍觀十方世界為見何事我時遍觀無量無邊恆河沙等十方世界其中皆有摩訶迦葉而打楗椎欲擯文殊是一切處亦有文殊在佛前坐佛告我言汝今欲擯何處文殊為此世界為十方界我時即禮佛世尊足作如是言聽我悔過世尊是文殊師利法王之子成就菩薩如是不可思議功德我從佛所成有量智而欲度無量智慧以不知故而打楗椎佛告我言摩訶迦葉汝之所見十方世界文殊師利亦復夏三月住王後宮及淫女舍此間文殊師利童子令是波斯匿王宮中五百女人不退阿耨多羅三藐三菩提亦令五百淫女五百童子得不退轉無上正道復有百千衆生以聲聞法而調伏之無量衆生得生天上我時白言大德世尊文殊師利為説何法乃能如是教化衆生佛言迦葉汝今可問文殊師利自當答汝我時即間文殊師利汝説何法教化調伏如是衆生彼答我言非惟説法教導衆生大德迦葉或有衆生以娛樂而調伏之或以護持或以威伏或以財攝或以貧劣或現大莊嚴或現神通或現釋身或現梵身或現護世身或現轉輪王身或隨各各所事諸天而為現身或以軟語或以粗語或二俱用或以謫罰或以密益或現作子何以故大德迦葉衆生有於雜種之行以雜種法而調伏之大德迦葉我以方便化衆生界然後説法令其究竟畢定調伏文殊菩薩現神變緣寶篋經云爾時大德阿難復語舍利弗我亦曾見文殊師利神通變化大德舍利弗昔於一時世尊在此舍衛國祇陀林中給孤窮精舍與大比丘僧八百人俱諸菩薩衆萬二千人是時興大悲雲時雨經七日七夜而不休止諸大德聲聞若得禪定及解脫者若入禪定七日不食餘凡夫人及諸學人五日絶食飢困羸瘦不能往覲見佛世尊禮敬供養我時念言是諸比丘甚為大苦當往白佛我時便法佛世尊所頂禮佛足白佛言世尊諸比丘僧絶食五日極為羸瘦不能從牀而自起止世尊告我阿難汝今可以是事往語文殊師利彼當充足比丘僧食我承佛教往詣彼文殊師利所住室中到已具説如是之事時文殊師利為釋梵護世而演説法即答我言阿難汝往敷座若時已至便擊楗椎我從文殊師利聞是語已即便敷座住在一處看文殊師利何時出房是文殊師利普為梵釋護世天王廣演説法名曰分別一切身三昧不出於房我作是念文殊師利將不令諸比丘失食時文殊師利凡作己身為諸釋梵護世説是分別一切身三昧文殊師利亦即入此分別一切身三昧已從房而出入舍衛大城次華乞食我時不見魔王波旬作是念言文殊師利師子吼已入舍衛大城而行乞食我今當蔽舍衛城中諸婆羅門長者居士無入出者不令施食爾時文殊師利童子隨所至處門戶悉閉無往來者文殊師利即時觀知是魔波旬隱蔽諸人我今當作誠實言誓爾時即作是志誠言我之所集一毛孔中所有福慧設恆河沙等諸佛世界滿中諸魔之所無有我此語實魔蔽當去令魔自身作居士像於四衢道諸巷陌中唱如是言當施文殊當施文殊若施是者獲大果報若施三千大千世界其中所有一切衆生給諸樂具百千億歲不如施此文殊師利一指端許所生福勝文殊師利須臾之間立此誓已爾時諸天遍開城中一切門戶令諸人衆皆趣文殊師利童子時魔波旬作居士像於諸四衢街巷陌中唱如是言當施文殊當施文殊若施是者獲大果報若施三千大千世界一切衆生樂供養具經百千歲不如施此文殊師利一指端許所生福勝時文殊師利以神通力令所持鉢受諸種種美妙飲食及餅果等不相和雜如別器盛八百比丘萬二千菩薩所食之食在一鉢中不見此鉢若滿若減爾時文殊師利童子於舍衛大城乞食已足出舍衛城以鉢置地語魔波旬以為淨人可持此鉢在前而去時魔波旬不能舉鉢生慚耻心語文殊師利我今不能舉此地鉢文殊師利語波旬言汝今成就大威神力云何不能舉地小鉢時魔波旬盡其神力不能舉鉢如毛分許怪未曾有語文殊師利我之神力舉伊沙陀山置之手掌擲虗空中今不能舉如此小鉢一毛分許文殊師利語波旬言若大衆生大人大力彼所持鉢非汝波旬所能擎舉是時文殊師利童子即以一指持舉地鉢著波旬手語波旬言汝為淨人持鉢前行時魔波旬盡力行鉢在前而去爾時自在天子與萬二千天子侍從圍繞來向文殊師利童子頂禮其足右繞已畢語波旬言汝非使人何故持鉢在他前行魔言天子我今不堪與有力者諍天子語言波旬汝亦成就大威神力爾時波旬為文殊師利力所持故答言天子愚癡之力是為魔力慧明之力是菩薩力憍慢之力是為魔力大智慧力是菩薩力諸邪見力是為魔力空無相無作力是菩薩力諸顛倒力是為魔力正真諦力是菩薩力我我所力是為魔力大慈悲力是菩薩力貪瞋癡力是為魔力三解脫力是菩薩力生死之力是為魔力無生無滅無有諸行無生忍力是菩薩力魔王波旬説是法時於大衆中五百天子發阿耨多羅三藐三菩提心千二百菩薩得無生法忍時文殊師利共魔波旬持此鉢食置迦利羅華園中已俱出外去我時不見文殊師利乃至食時猶不出房我作是念文殊師利將不令諸比丘僧衆失於日時當往佛所具白是事即至佛所頂禮佛足白言世尊食時已至文殊師利猶不出房佛告我言阿難汝不到此迦利羅園中而看之耶我白佛言大德世尊見一小鉢其食滿中佛告我言速打楗椎集比丘僧我言世尊比丘僧多是一鉢食當與誰耶佛語我言汝勿慮是設使三千大千世界所有一切諸衆生等於百千歲食此鉢食猶不能盡何以故是文殊師利力所持鉢文殊師利有種波羅蜜無量功德我聞佛語便打楗椎集比丘僧時此鉢食不相和雜香美衆味取不可盡充滿大衆鉢食不減時魔波旬欲惱文殊師利童子即便化作四千比丘衣服弊壞威儀粗惡執持破鉢鼻眼角睞手拳腳跛其形醜惡在下行坐以此鉢食復充足之時魔波旬令化比丘人人各食摩伽陀國千種之食然此鉢食猶滿不減令諸守園作使之人傳食疲頓時文殊師利以神力持令魔波旬所化比丘鉢食不減手口俱滿而不能咽氣閉眼張悉皆躄地文殊師利語波旬言汝諸比丘何不更食惡魔答言文殊師利是諸比丘在地垂死汝將不以毒食與耶文殊師利語波旬言已盡毒人當有何毒內有毒者則施人毒內無毒者不施人毒波旬所謂毒者名貪瞋癡善讚法中所調伏者若與人毒無有是處又魔波旬所謂毒者無明有愛見我我所見無因緣見於名色見愛恚瞋見我見衆生見諸蓋纏計著諸陰起種性慢報著諸入常住三界繫著所依守護取捨若來若去愛著於身堅著壽命不淨思念愛樂染心多起諸過違逆因緣斷見常見諂曲憍慢妄想分別示現詐偽執著巢窟出沒卷舒驚畏於空於無想中生墮落想於無作中生死畏想於無著處生起畏想於出生死生起縛想於駛流示生度想助菩提生非法想於邪見中生正見想於惡知識生善知識想違佛謗法輕衆僧不捨憍慢增長諍訟實不實想不實實想於欲樂中生功德想於有為中心生狂惑於生死行不見其過涅槃中生驚怖想波旬如是諸法於妙法中名之為毒佛正法中無如是事波旬甘露法者是名佛法安隱法者是名佛法無戲論法是名佛法無過惡法是名佛法無結使法是名佛法出要之法是名佛法無怖畏法是名佛法無分別法是名佛法不執自他法是名佛法無譏呵法是名佛法作舍作歸依作洲渚作守護法是名佛法調伏寂法是名佛法自淨無垢照明之法是名佛法正向正趣法是名佛法無諸妄想善調伏法是名佛法善教善道隨宜之法是名佛法自説説他法是名佛法如法調伏諸外道法是名佛法降諸魔法是名佛法斷生死流法是名佛法正念之法是名佛法住念處故正斷法是名佛法斷諸惡故神足法是名佛法觀身心輕故諸根法是名佛法信為首故諸力法是名佛法無能降伏故諸覺法是名佛法次第覺故正道法是名佛法正流入故三昧法是名佛法究竟寂靜故智慧法是名佛法貫穿諸聖解脫法故真諦法是名佛法無忿恚故諸辨法是名佛法法辭及義樂説無滯故明了無常苦無我法是名佛法呵毀一切諸有為故空法是名佛法降伏一切諸外道故寂靜法是名佛法趣涅槃故波羅蜜法是名佛法至彼岸故方便法是名佛法善攝取故慈法是名佛法無過智故悲法是名佛法無逼切故喜法是名佛法滅不喜故捨法是名佛法所作辦故禪法是名佛法滅憍慢故不斷三寶法是名佛法發菩提心故一切安樂無苦惱法是名佛法不求諸有故説是法時魔王所將五百天子發阿耨多羅三藐三菩提心
