body:
  text: 性善惡論序性惡外典所諱也而台宗揭真性之所具而神用之專用是為家珍苟非習於其教者雖老宿沙門聞而掩耳走矣余讀有門大師性善惡論而歎四依菩薩慈悲良深重焉何則我輩眾生與三毒如惡叉聚歷生浩劫住修惡中反而之善艱謬良多制伏強則醉靜慮之酒厭離極則墮無為之穽所謂謬也懸觀清淨初心絕分歷別修證積劫難成所謂艱也揆厥所由良以惡異善故不有性具法門雙融善惡何由知十界之同如悟眾生之即佛一切現成至圓至頓豈有過此者乎故談佛性者不難言善而難言具也故曰台衡二師慈悲深重也武津性染翻起信惟淨之旨智者理毒闡維摩二即之談雖復以具立宗而意主於觀惡融通任運攝善妙宗建立揭惡緣了謂勝他宗此秘始顯海寶之如意眾願之德瓶山外諸師不得與焉故談台宗者不難言具而難言惡也故曰四明以來諸師慈悲深重也西來一宗指屎尿為法身示薦取於聲色印合山家寧盡鳥唧然言前句外專待上根至如天臺一家文字總持如雨普潤婆心婆舌若惟恐其說之不詳與其解之不晰大師此論更旁引曲證原始要終設之以辨贅之以說示之以事繫之以圖雖以余轂之不敏向於君子皆能蛣𧏙究竟之旨茫若望洋卒業此憬然有入焉故談性惡者不難於言惡而難於言之言之必使人洞胸澈髓如開戶見其家藏而後已也故曰師之慈悲深重也論成而冠儒者頗用非孟以相徵詰余曰唯唯否否三教聖賢言性皆同而異孟甞言備物矣備善而遺惡詎可言皆修多羅處處稱本來成佛佛弟子何必不言性善顧世教嚴於防惡出世間教妙於融善適時逗機各有攸當也即儒者言性寧渠皆善相近不移不隱然一性具耶宣尼言具騶孟言善然騶孟言善姚江又言無善無惡而聖學愈明如來言善台衡言具然台衡言具四明諸祖以及大師又具言善惡而佛心彌暢姚江一派儒宗至今研味不休師論既出後五百歲中稱見性津梁者非此其誰也三教聖賢皆貴有賢子孫哉貴有賢子孫哉天台門弟子香光居士王立轂合十書於圓伊室性善惡論序談偏空者治世之道乖宗緣起者涅槃之路隔由是所知沙聚見愛河深落見愛則洄澓生死之波障所知則汩沒無為之穽庸詎知淤泥卑濕常生瑞世之分陀終嘅夫陸地高原未產應時之優鉢此妙有法門釋迦如來所以捉塵三復而談諸大菩薩所以擊節再賡而和也何則蓋一言其有則萬行因得以芬披而至人之化導行一言其妙則真如以之而廖廓而凡夫之生死絕方有而妙則妙不自妙方妙而有則有不自有有不自有則窮年行度一道清淨以忘緣妙不自妙則終日袪情萬法森羅而建立夫如是則妙有恒即而不即恒離而不離吾何獨妙其妙而獨有其有哉此諸佛菩薩大人作略固不可得而思議也第有非緣有微性具無以建其宗具非偏具微十界無以盡其旨修性繇是以分善惡因之以辨是故假託賓主以性善惡而立論焉然以道該儒釋理別偏圓各有攸歸曷容槩與世出世間之旨不得不霄壤以分庭大小頓漸之宗不得不雲泥而立壺兼之脩性駢舉法喻重伸援事援人證經證論言將六萬矢筆以記而安得乎絕妙好辭門列八科率意而宣聊契乎妙覺明性下筆於皇明天啟建元之初年季夏中澣書成于仲秋之哉生明閣筆故序天台山幽溪沙門無盡傳燈和南撰于楞嚴壇東方之不瞬堂往生居士弟子聞龍正願蘭陵夢澤居士張師繹楚蘄滄孺居士弟子袁世振香光居士弟子王立轂心城居士弟子劉錫玄同校正達月居士弟子管瓏正見僧摩居士弟子馬騰正眼圓觀居士弟子余曰新正脩元歎居士弟子徐波受權
