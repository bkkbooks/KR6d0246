body:
  text: 天台山幽溪沙門傳燈著第三勝熱婆羅門緣華嚴經云善財童子參毗目瞿沙善知識已復告之言善男子於此南方有一聚落名伊沙那有婆羅門名曰勝熱汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子歡喜踊躍頂禮其足繞無數匝殷勤瞻仰辭退南行爾時善財童子為菩薩無勝幢解脫所照故住諸佛不思議神力證菩薩不思議神通智得菩薩不思議三昧智光明得一切時熏修三昧智光明得了知一切境界皆依想所住三昧智光明得一切世間殊勝智光明於一切處悉現其身以究竟智説無二無別平等法以明淨智普照境凡所聞法皆能忍受清淨信解於法自性決定明了心恆不捨菩薩妙行求一切智永無退轉獲得十力智慧光明勤求妙法常無厭足以正修行入佛境界出生菩薩無量莊嚴無邊大願悉已清淨以無窮盡智知無邊世界網以無怯弱心度無量衆生海了無邊菩薩諸行境界見無邊世界種種差別見無邊世界種種莊嚴入無邊世界微細境界知無邊世界種種名號知無邊世界種種言説知無邊衆生種種解見無邊衆生行見無邊衆生成熟行見無邊衆生差別想念善知識漸次遊行至伊沙那聚落見彼勝熱修諸苦行求一切智四面火聚猶如大山中有刀山高峻無極登彼山上投身入火時善財童子頂禮其足合掌而立作如是言聖者我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩行云何修菩薩道我聞聖者善能誘誨願為我説婆羅門言善男子汝今若能上此刀山投身火聚諸菩薩行悉得清淨時善財童子作如是念得人身難離諸難難得無難難得淨法難得值佛難具諸根難聞佛法難遇善人難逢真善知識難受如理正教難得正命難隨法行難此將非魔羅所使耶將非是魔險惡徒黨詐現菩薩善知識相而欲為我作善根難作壽命難障我修行一切智道牽我令入諸惡道中欲障我法門障我佛法作是念時十千梵天在虗空中作如是言善男子莫作是念莫作是念今此聖者得金剛𦦨三昧光明發大精進度諸衆生心無退轉欲竭一切貪愛海欲截一切邪見網欲燒一切煩惱薪欲照一切惑稠林欲斷一切老怖畏欲壞一切三世障欲放一切法光明善男子我諸梵天多著邪見皆悉自謂是自在者是能作者於世間中我是最勝見婆羅門五熱炙身於自宮殿心不樂著於諸禪定不得滋味皆共來詣婆羅門所時婆羅門以神通力示大苦行為我説法能令我等滅一切見除一切慢住於大慈行於大悲起廣大心發菩提意常見諸佛恆聞妙法於一切處心無所礙復有十千諸魔在虗空中以天摩尼寶散婆羅門上告善財童子善男子此婆羅門五熱炙身時其火光明映奪於我所有宮殿諸莊嚴具皆如墨聚令我於中不生樂著我與眷屬來詣其所此婆羅門為我説法令我及餘無量天子諸天女等皆於阿耨多羅三藐三菩提得不退轉復有十千自在天王於虗空中各散天華作如是言善男子此婆羅門五熱炙身時其火光明映奪我等所有宮殿諸莊嚴具皆如聚墨令我於中不生愛著即與眷屬來詣其所此婆羅門為我説法令我於心而得自在於煩惱中而得自在於受生中而得自在於諸業障而得自在於諸三昧而得自在於諸莊嚴具而得自在於壽命中而得自在乃至能於一切佛法而得自在復有十千化樂天王於虗空中作天音樂恭敬供養作如是言善男子此婆羅門五熱炙身時其火光明照我宮殿諸莊嚴具及諸婇女能令我等不愛欲樂身心柔軟即與衆俱來詣其所時婆羅門為我説法能令我等心得清淨心得明潔心得純善心得柔軟心生歡喜乃至令得清淨十力清淨之身生無量身乃至令得佛身佛語佛聲佛心具足成就一切智智復有十千兜率天王天子天女無量眷屬於虗空中雨衆妙華恭敬頂禮作如是言善男子此婆羅門五熱炙身時令我等諸天及其眷屬於自宮殿無有樂著共詣其所聞其説法能令我等不貪境界少欲知足心生歡喜心得充滿生諸善根發菩提心乃至圓滿一切佛法復有十千三十三天并其眷屬天子天女前後圍繞於虗空中雨天曼陀羅華恭敬供養作如是言善男子此婆羅門五熱炙身時令我等諸龍於天音樂不生樂著共詣其所時婆羅門為我等説一切諸法無常敗壞令我捨離一切欲樂令我斷除憍慢放逸令我愛樂無上菩提又善男子我當見此婆羅門時須彌山頂六種震動我等恐怖皆發菩提心堅固不動復有十千龍王所謂伊那羅龍王難陀優波難陀龍王等於虗空中雨黑栴檀無量天女奏天音樂雨天妙華及天香水恭敬供養作如是言善男子此婆羅門五熱炙身時其火光明普照一切諸龍宮殿令諸龍衆離熱沙怖金翅鳥怖滅除瞋恚身得清淨心無垢濁聞法信解厭惡龍趣以致誠心悔除業障乃至發阿耨多羅三藐三菩提意住一切智復有十千夜叉王於虗空中以種種供具恭敬供養此婆羅門及以善財作如是言善男子此婆羅門五熱炙身時我及眷屬悉於衆生發慈愍心一切羅剎鳩槃茶等亦生慈心以慈心故於諸衆生無所惱害而來見我我及彼等於自宮殿不生樂著即與共俱來詣其所時婆羅門即為我等如應説法一切皆得身心安樂又令無量夜叉羅剎鳩槃茶等發於無上菩提之心復有十千乾闥婆王於虗空中作如是言善男子此婆羅門五熱炙身時其火光明照我宮殿悉令我等受不可思議無量快樂是故我等來詣其所此婆羅門五熱炙身能令我等於阿耨多羅三藐三菩提得不退轉復有十千阿修羅王從大海出住在虗空舒右膝輪合掌前禮作如是言善男子此婆羅門五熱炙身時我阿修羅所有宮殿大海大地悉皆震動令我等捨憍慢放逸是故我等來詣其所從其聞法捨離諂誑安住忍地堅固不動圓滿十力復有十千迦樓羅王勇力持王而為上首化作外道童子之形於虗空中作如是言善男子此婆羅門五熱炙身時其火光明照我宮殿一切震動皆悉恐怖是故我等來詣其所時婆羅門即為我等如應説法令修習大慈稱讚大悲度生死海於欲泥中拔濟衆生歎菩提心起方便智隨其所宜調伏衆生復有十千緊那羅王於虗空中唱如是言善男子此婆羅門五熱炙身時我等所住宮殿諸多羅樹諸寶鈴網諸寶繒帶諸音樂樹諸妙寶樹及諸樂器自然而出佛聲法聲及不退轉菩薩僧聲願求無上菩提之聲云某方某國有某菩薩發菩提心某方某國有某菩薩修行苦行難捨能捨乃至清淨一切智行某方某國有某菩薩往詣道場乃至某方某國有某如來作佛事已而般涅槃善男子假使有人以閻浮提一切草木末為微塵此微塵數可知邊際我宮殿中寶多羅樹乃至樂器所説菩薩名如來名所發大願所修行等無有能得知其邊際善男子我等以聞佛聲法聲菩薩僧聲生大歡喜來詣其所時婆羅門即為我等如應説法令我及餘無量衆生於阿耨多羅三藐三菩提得不退轉復有無量欲界諸天於虗空中以妙供具恭敬供養唱如是言善男子此婆羅門五熱炙身時其火光明照阿鼻等一切地獄諸所受苦悉令休息我等見此火光明故心生淨信以信心故從彼命終生於天中為知恩故來詣其所恭敬瞻仰無有厭足時婆羅門為我説法令無量衆生發菩提心爾時善財童子聞如是法心大歡喜於婆羅門所發起真善知識心頭頂禮敬唱如是言我於大聖善知識所生不善心惟願聖者容我悔過時婆羅門即為善財而説頌曰若有諸菩薩順善知識教一切無疑懼安住心不動當知如是人必獲廣大利坐菩提樹下成於無上覺爾時善財童子即登刀山自投火聚未至中間即得菩薩善住三昧才觸火𦦨又得菩薩寂靜樂神通三昧善財白言甚奇聖者如是刀山及大火聚我身觸時安隱快樂時婆羅門告善財言善男子我惟得此菩薩無盡輪解脫如諸菩薩摩訶薩大功德𦦨能燒一切衆生惑令無有餘必不退轉無窮盡心無懈怠心無怯弱心發如金剛藏那羅延心疾修諸行無遲緩心願如風輪普持一切精進大誓皆無退轉而我云何能知能説彼功德行善男子於此南方有城名師子奮迅中有童女名曰慈行汝詣彼問菩薩云何學菩薩行修菩薩道時善財童子頂禮其足繞無數匝辭退而去釋曰婆須蜜多女以貪欲而作佛事者也無厭足王以嗔恚而作佛事者也勝熱婆羅門以邪見而作佛者也貪恚邪見修惡也婆須密多女以是而獲離貪欲際解脫無厭足王於是而獲如幻解脫勝熱婆羅門於是而獲菩薩無盡輪解脫正由因中達修惡即性惡性惡融通無法不趣任運攝得佛界性善既以是而自見道復以是而度脫衆生無行經云貪欲即是道恚癡亦復然如是三法中具一切佛法豫於三大善知識而見之矣二明衆生機緣須此入道者衆生機緣入道不同有從善緣入道者此如常途所説有從惡緣入道者蓋由此人宿世雖有值三寶緣而興道念中間被惡緣牽引而多造惡業由此多劫墮苦果報將盡而宿根成熟以惡緣故今生仍復有種種惡事以根熟故得值三寶翻邪歸正速得悟入今略引二緣以證其義第一央掘魔羅緣央掘魔羅經云舍衛城北去城不遠彼處有林名為薩那有一貧窮婆羅門女名跋陀羅女生一子名一切世間現少失其父厥年十二色力人相具足第一聰明辨慧微言善説復有異村名頗羅呵私有一舊住婆羅門師名摩尼跋陀羅善能通達四毗陀經時世間現從其受學謙順恭敬盡心供養諸根純熟所受奉持爾時彼師暫受王請留世間現守舍而去婆羅門婦年少端正見世間現即生染心忽忘儀軌前執其衣時世間現白彼婦言仁今便為是我之母如何尊處而行非法內懷愧悚捨衣遠避爾時彼婦欲心熾盛泣淚念言彼見斷絶不隨我意若不見從要斷其命不使是人更餘婚娶即以指爪自攖其體淫亂彌熾自燒成病行女人諂莊嚴其身以繩自縊足不離地時摩尼跋陀事畢還家以刀截繩高聲大呌誰為此事時婦答言是世間現欲行非法強見陵遍作如是事摩尼拔陀先知其人有大德力即思惟言彼初生日一切剎利所有刀劒悉皆出利劍捲屈墮落於地時諸剎利皆大恐怖其生之日有如此相當知是人有大德力思惟是已語世間現汝是惡人毀辱所尊汝今非復真婆羅門當殺千人可得除罪世間現稟性恭順尊重師教即白師言嗚呼和尚殺害千人非我所應師即謂言汝是惡人不樂生天作婆羅門耶答言和尚善哉奉命即殺千人還禮師足師聞見已生希有心汝大惡人故不死耶復作念言今當令死而告之言殺一一人取一一指殺千人已取指作鬘冠首而還然後得成婆羅門耳以是因緣名央掘魔羅即白師言善哉和尚受教即殺千人少一爾時央掘魔羅母念子當飢自持四種美食送往與之子見母已作是思惟當令我母得生天上即便執劍欲前斷命去舍衛國十由延少一丈於彼有樹名阿輪迦爾時世尊以一切智如是知時如鴈王來央掘魔羅見世尊來執劍疾往作是念言我今復當殺是沙門瞿曇爾時世尊示現避去時央掘魔羅而説偈言住住大沙門白淨王太子我是央掘魔今當稅一指住住大沙門無貪染衣士我是央掘魔今當稅一指凡説三十四偈餘三句皆同惟改第二句云毀形剃髮士知足待鉢士無畏師豫遊雄健猛虎步儀雅鵝王超安詳龍象行明朗日初出明淨盛滿月莊嚴真金山千葉蓮華眼素齒白蓮華善説真言舌眉間白毫相光澤紺青髮過膝傭長臂離欲馬王藏膝骨密不現手足赤銅甲輕舉躡虗足迦陵頻伽聲憍吉羅妙音百億勝光耀諸根善調伏十力悉具足善持四真諦説八道饒益三十二相具八十種妙好永滅諸愛欲莫令我起嗔未曾見奇特乃至問云汝是何等人如是極疾行及我未下刀知時宜速住汝善持淨戒宜速輸一指莫度我境界爾時世尊猶如鵝王庠行七步師子顧視為央掘魔羅而説偈言住住央掘魔汝當住淨戒我是等正覺輪汝慧劍稅我住無生際而汝不覺知汝央掘魔羅我是等正覺今當輪汝稅無上善法水汝今當速飲永除生死渴乃至為説十六偈末云我是等正覺輪汝慧劍稅汝當棄利刀疾來歸明智莫隨惡師慧非法謂為法應嘗至藥味然後深自覺一切畏杖痛莫不愛壽命取己可為譬勿殺勿教殺如他己不異如己他亦然取己可為譬勿殺勿教殺莫作羅剎形人血常塗身人血塗利劍不宜恆在手速捨手指鬘離是二生業二生非法等是則惡羅剎羔羊於母所猶尚知孝養哀哉汝可愍為惡師所誤揮手奮利劍而欲害所生汝今所造業惡業過禽獸殺害甚羅剎此暴踰修羅永入弊魔黨長與人類分咄哉惡逆者母恩世難報懷妊十二月將護盡胎養既生常鞠育長夜忍若穢今且觀汝母血淚盈目流忘身愛念汝躬自持食來風吹髮髼亂塵土坌汙身手足悉龜坼衆苦集朽形久受飢渴惱寒暑亦修經逼切心狂亂愁毒恆怨嗟爾時彼母見佛世尊與央掘魔羅往返苦論子心降伏縱身垂臂念其子故説偈白佛久失寶藏今還得塵穢壞眼令明淨哀哉我子心迷亂常以人血自塗身極利刀劒恆在手多殺人衆成尻聚當令此子隨順我今敬稽首等二覺多人見罵難聽聞汝子如是切責我爾時世尊告央掘魔羅此樹下者是汝之母生育之恩深重難報云何欲害令其生天如是乃至種種破其愚迷復自稱讚種種功德是所歸依處令其捨劍出家飲甘露法水乃至云汝久遊惡道迷亂疲倦今當休息汝是稅主我亦稅主為守道王於一切衆生常受其稅令其超度生死有海爾時央掘魔羅即捨利劒如一歲嬰兒捉火即放振手啼泣時央掘魔羅捨鬘振手發聲號呌亦復如是如人熟眠蛇卒嚙腳即時驚起振手遠擲央掘魔羅速捨指鬘亦復如是爾時央掘魔羅如離非人所持自知慚愧血出遍身淚流如雨譬如有人為蛇所螫良醫為呪令作蛇行央掘魔羅宛轉腹行三十九旋亦復如是然後進前頂禮佛足而説偈言奇哉正覺第一慈調御人師為我來令我得度無如海愚癡暗冥濤波惑奇哉正覺無上悲調御人師為我來度我生死曠野難種種煩惱棘刺林奇哉正覺第一喜調御人師為我來令我得度諸迷惑邪見虎狼禽獸難奇哉正覺第一捨調御人師為我來令我得度無擇獄永離熾然無量苦無依怙者為作依無親厚者為作親集衆惡業趣大苦令為我來作歸依爾時世尊告央掘魔羅汝今可起速往母所至誠悔過求聽出家爾時央掘魔羅從佛足起往至母所繞旋多匝五體布地至誠懺悔悲感大呌即向其母而説偈言嗚呼慈母我大過集諸惡業成罪積隨惡師教行暴害殺人一千惟少一我於今日歸依母亦復歸依佛世尊我今稽首禮母足惟願哀愍聽出家爾時彼母説偈答言我今已聽汝出家為後世我亦求如來出家受具足奇哉難思議如來無有譬佛今度我子普哀諸世間如來妙色身功德無倫匹今我少稱歎最勝天中天爾時世尊以偈答言善哉善女人當得無間樂今可聽汝子於我前出家汝今年衰老出家時已過但當深信樂以法自穌息汝今且小待波斯匿王至爾時天帝釋將諸天衆婇女眷屬放身光明照舍衛國見央掘魔羅與佛相抗力屈心變摧伏歸悔發大歡喜説偈讚佛已向央掘魔羅言惟願大士受此天衣以為法服央掘魔羅謂帝釋言汝是何等蚊蚋小蟲我豈當受此不信之施汝是何等貪欲之驢未度生死衆苦長流自性裸形何能施衣乃至云如佛所歎十二頭陀沙門行法我應當學乃至云如是等輩今當調伏如治稊稗害善苗者我之所殺作指鬘者彼等悉是壞法衆生無有一是比丘比丘尼優婆塞優婆夷者復與帝釋辨菩薩聲聞害不害相不同其説甚長乃至梵天王四天王魔醯首羅樹神各以衣施悉皆不受相與辨論莫不辭為之屈即尊者舍利弗目犍連阿難羅𬑟羅阿那律尼陀沙滿願子等諸大尊者相與辨難亦為之屈至文殊師利大菩薩人示現亦辨為之訥爾時世尊向央掘魔羅而説偈言汝來央掘魔出家受三歸爾時央掘魔羅以偈言此乘是大乘説名無礙智一乘一歸依佛第一義依佛法是一義如來妙法身僧者説如來如來即是僧法及比丘僧二是方便依如來非方便是第一義依是故我今日歸依於如來於諸歸依中如來真實依如欲食興蕖應當取真實捨真食虗偽自它無利益如是愚癡人千佛莫能救如是捨一依修習方便依是則群癡衆千佛不能救爾時世尊告央掘魔羅汝當受持童真淨戒沙彌別名童真爾時央掘魔羅以偈問曰云何為童真云何具足戒云何真沙門云何為福田爾時世尊默然而住央掘魔羅復説偈言若不知一依是第一義依不能知二依方便所建立當知如是依是世間童真未受具足戒云何是沙門不知一歸依云何淨歸依若不知如來是第一義依不清淨歸依云何為沙門不知真實依云何為福田於是二歸依真實及方便不善知差別是則世童真爾時世尊告央掘魔羅汝當受持不殺戒央掘魔羅以偈答言我今定不能受持不殺戒我當常受持斷絶衆生命所言衆生者無量諸煩惱若能常害彼是名持殺戒爾時世尊復告之言汝當受持不妄語戒央掘魔羅以偈答言我今定不能受持不妄語當於一切法受持妄説句受持虗妄説是則諸佛法所言為妄者一切諸法空復有虗妄法聲聞及緣覺菩薩之所行隨順世間事復有虗妄法我出於世間受持具足戒得成阿羅漢如是凡二十一偈乃至云是故我從今當行虗偽事乃至極衆生一切虗妄際不受離虗妄則我戒清淨爾時世尊告央掘魔羅汝當受持不飲酒戒央掘魔羅以偈答言我今亦不能受持不飲酒常受飲酒戒長夜恆縱逸由是大呌呼宛轉遍五道一向極快樂是則名為酒從彼大乘生無上佛藏酒是酒我今飲自足勸衆生常住不變易歡喜歎善哉人聲大宣唱酣醉無終極爾時世尊告央掘魔羅汝今當受不淫淨戒央掘魔羅以偈答言我今亦不能受持不淫戒我當常受持貪著他所愛與彼相娛樂三昧樂為妻真諦法為子慈悲心為女法空為舍宅無量波羅蜜以為高廣床侍衛諸煩惱隱覆説為食總持為園苑七覺華莊嚴法語為林樹解脫智為果是等名世間第一勝娛樂慧者自性法非是愚境界爾時世尊告央掘魔羅汝今當受離不與取戒央掘魔羅以偈答言我今亦不能受持不盜戒常受不與取劫盜他財物不與者菩提無有授與者不與而自取故我不與取佛坐菩提樹不得亦不失此是自性法最勝無有上爾時佛告央掘魔羅汝今當受不歌舞戒央掘魔羅以偈答言我當習舞樂歌乾闥婆偈宣示如來藏嗟歎稱善哉於波諸佛所聞如來常住恆如妙音誦大乘修多羅猶如緊那羅乾闥婆伎樂無量衆妙音供養諸經卷若彼諸衆生常興是供養諸佛悉授記未來同一號爾時世尊乃以一學問之央掘魔羅以增數從一學以至於十答之竟復白佛言世尊説言我住無生際此説有何義等佛命同文殊俱至北方過一恆河沙剎乃至十恆河沙剎東南西北四維上下各過一恆河沙剎以至於十彼十佛剎剎剎有佛皆釋迦如來異名而告二人言善男子釋迦牟尼如來即是我身汝等還去語彼佛言無量慧佛等遣我等還云彼佛如來當為汝説釋迦如來為説其義廣如經文爾時世尊歎言善哉善哉央掘魔羅汝來比丘即成沙門威儀具足如舊比丘爾時央掘魔羅稽首佛足白佛言世尊我今已來尋聲即得阿羅漢果佛又告言汝來祗陀林廣度衆生與文殊師利諸大尊者圍繞俱往至祇陀林升師子座三千大千世界地平如掌生柔軟草如安樂國一切諸方諸大菩薩皆欲來見央掘魔羅説於妙法廣如經文爾時波斯匿王興四種兵欲往征伐大臣兵衆莫不震懾無一應命王領兵衆往詣佛所稽首佛足有怖畏色為之汗流如來知而故問大王今日何故流汗王白佛言今有羅剎名央掘魔羅殺害人民一千少一以指作鬘以血塗身嚴此四兵欲往伐之佛告大王若央掘魔羅來至此者當復云何王白佛言若彼來如是為一爾時世尊指示王言此即央掘魔羅大王歎言奇哉世尊真為第一調御之轅真為無上天人之師如是凶暴有惡業者乃能方便安立正法爾時世尊説偈歎言人前放逸後止不犯是照世間如月雲消若大菩薩先現放逸後現功德是照世間如月雲消度無量衆生現如來功德大王當知彼非惡人是則菩薩善方便耳譬如龍象蹴踏非驢所堪南方去此六十二恆河沙剎有國名一切寶莊嚴佛名一切世間樂見上大精進如來彼佛如來豈異人乎央掘魔羅是也諸佛境界不可思議即彼之母師及師母為欲利益皆我所化以作佛事爾時王及大衆天龍八部莫不稽首央掘魔羅之足一心同聲説偈讚歎南無如來無邊身南無方便央掘魔我今頂禮聖足下懺悔天尊柔軟足我今懺悔如來尊央掘魔羅二生身為我等故來至此現佛色像勝光𦦨照諸衆生堪能説我數懺悔無量身無依無依等正覺無親怙者為作親奇哉二佛出於世未曾有法行於世猶如火中生蓮華世間希有見二佛爾時世尊説是經已諸天龍神聲聞菩薩及波斯匿王一切衆會皆慕央掘魔行及文殊師利菩薩願生彼國皆發阿耨多羅三藐三菩提心踴躍歡喜釋曰央掘魔羅者一切世間樂見上大精進如來之所示現者也若母若師若師母又皆釋迦如來之所變化若其所殺九百九十九人未聞開權應是實殺乃於世間蠧國害民妨道衆必殺而有益而然後殺之雖曰殺之其實度之何也未有具慈善根力者視螻蟻等於赤子而妄有所殺也以是故知迎其刃而截其指者莫不殺煩惱賊而捐標月指也若仙豫之誅五百婆羅門因而墮獄知悔敬信大乘得生甘露鼓王佛國又獲延其劫壽非將欲與其長壽而必固奪其短命將欲反其正見而必固懲其邪見乎至於佛示以童真之戒則皆反其名而廣其義其於性惡法門則確然揭而言之莫不令聞者顧名而思義且復密示如來菩薩大人示現境界固不可得而思議也第二阿闍世王行惡重悔滅罪緣涅槃經云爾時王舍大城阿闍世王其性斃惡喜行殺戮具口四惡貪瞋愚癡其心熾然惟見現在不見未來純以惡人而為眷屬貪著現世五欲樂故父王無辜橫加逆害因害父已心生悔熱身諸瓔珞妓樂不御心悔熱故遍體生瘡其瘡臭穢不可附近尋自念言我今此身已受華報地獄果報將近不遠爾時其母字韋提希以種種藥而為傅之其瘡遂增無有降損王即白母如是瘡者從心而生非四大起若言衆生有能治者無有是處爾時大醫名曰耆婆往至王所白言大王得安眠否王即以偈答言若有能永斷一切諸煩惱不貪染於三乃得安隱眠若得大涅槃演説甚深義名真婆羅門乃得安隱眠身無諸惡業口離於四過心無有疑網乃得安隱眠身心無熱惱安住寂靜處獲至無上樂乃得安隱眠心無有取著遠離諸怨讎常和無諍訟乃得安隱眠乃至總説十六偈半以答耆婆又曰耆婆我今病重於正法王興惡逆害一切良醫妙藥呪術善巧瞻病所不能治何以故我父先王如法治國實無過咎橫加逆害如魚處陸當有何樂如鹿在初無歡心乃至云云何當得安隱眠耶耆婆答王善哉善哉王雖作罪心生重悔而懷慚愧大王諸佛世尊常説是言有二白法能救衆生一慚二愧慚者自不作罪愧者不教他作慚者內自羞恥愧者發露向人慚者羞人愧者羞天是名慚愧無慚愧者不名為人名為畜生有慚愧者則能恭敬父母師長有慚愧故説有父母兄弟姊妹耆婆大臣為王説種種法若能慚愧則能滅罪乃至宣揚釋迦如來種種功德能生衆生一切善能滅衆生一切惡王若往者求佛懺悔罪即消滅爾時大王答言耆婆如來世尊性已調柔故得調柔以為眷屬如栴檀林純以栴檀而為圍繞如來清淨所有眷屬亦復清淨乃至云吾今既是極惡之人惡業纏褁其身臭穢繫屬地獄云何當得至如來所吾設往者恐不顧念接敘言説卿雖勸吾令往佛所然吾今日深自鄙悼都無去心爾時其父頻婆娑羅王雖逢子弒因聞佛法已得道果亦於空中勸王往至佛所求哀懺悔王聞空語心懷怖懼舉身戰栗五體掉動如芭蕉葉仰而答曰汝為是誰不現色像而但有聲空聲答言吾是汝父汝今當隨耆婆所説時王聞已悶絶躃地身瘡增劇臭穢倍前雖以冷藥塗治瘡蒸毒熱但增無損爾時世尊大悲導師為阿闍世王入月愛三昧入三昧已放大光明其光清涼往照王身身瘡即愈熱除滅王覺瘡愈身體清涼語耆婆言會聞人説劫將欲盡三月並現當此之時一切衆生患苦悉除時既未至此光何來耆婆答言大王當知是天中天所放之光王言彼天中天以何因緣放斯光明答言大王今是瑞相似相為及以王先言世無良醫療治身心故放斯光先治王身然後及心王言耆婆如來世尊亦念及耶耆婆答言譬如一人而有七子是七子中一子遇病父母之心非不平等然於病子心則偏多大王如來亦爾於諸衆生非不平等然於罪者心則偏重於放逸者心則慈念不放逸者心則放捨云云王又問言何等名為月愛三昧耆婆答言譬如月光能令一切優鉢羅華開敷鮮明月愛三昧亦復如是能令衆生善心開敷是故名為月愛三昧如是凡説五譬以喻五義王言我聞如來不與惡人同止坐起語言談笑猶如大海不宿死尸如鴛鴦鳥不住圊廁釋提桓因不與鬼住鳩羅鳥不捿枯樹如來亦爾我當云何而得往見設其見者我見將不陷入地耶耆婆答言大王譬如渴人速赴清泉飢夫求食怖者求救病求良醫熱求蔭涼寒者求火王今求佛亦應如是大王如來尚為一闡提等演説法要何況大王非一闡提如是勸喻其言非一王語耆婆若使如來審如是者明當選擇良日吉辰然後乃往耆婆白王大王如來法中無有選擇良日吉辰大王如重病人猶不看日惟求良醫王今病重求佛良醫不應選擇吉日凶日若到佛所俱得滅罪惟願大王今日速往爾時大王即命大臣速辦供養與其夫人嚴駕車乘一萬二千與諸眷屬臣民其數無量尋路而來爾時佛告大衆一切衆生為無上菩提近因緣莫先善友何以故阿闍世王若不隨順耆婆語者來月七日必定命終墮阿鼻獄是故近因莫若善友阿闍世王復於前路聞舍婆提毗琉璃王乘船入海遇火而死瞿迦離比丘生身入地至阿鼻獄須那剎多即種種惡到於佛所衆罪得滅聞是語已語耆婆言吾今雖聞如是二言猶未審定汝來耆婆吾欲與汝同載一象設我當入阿鼻地獄冀汝捉持不令我墮何以故我昔曾聞得道之人不入地獄爾時佛告諸大衆言阿闍世王猶有疑心我今當為作決定心爾時大王即到娑羅雙樹間至於佛所仰瞻如來三十二相八十種好猶如微妙真金之山爾時世尊出八種聲告言大王時阿闍世左右顧視此大衆中誰是大王我既罪戾又無福德如來不應稱為大王爾時如來即復喚言阿闍世大王時王聞已心大觀喜即作是言如來今日顧命語言真知如來於諸衆生大悲憐愍等無差別白言世尊我今疑心永無遺餘定知如來真是衆生無上大師爾時阿闍世王即以手持幡蓋華香妓樂供養前禮佛足右繞三匝禮敬畢已却坐一面爾時佛告阿闍世王言大王今當為汝説正法要汝當一心諦聽凡夫常當繫心觀身有二十事所謂我此身中空無無漏一無諸善根本二我此生死未得調順三墮墜深坑無疑不畏四以何方便得見佛性五云何修定得見佛性六生死常苦無常我淨七八難之難難得遠離八恆為怨家之所追逐九無有一法能遮諸有十於三惡趣未得解脫十一具足種種諸惡邪見十二亦未曾造度五惡津十三生死無際未得其邊十四不作諸業不退果報十五無有我作他人受果十六不作樂因終無樂果十七若有造業果終不失十八因無明生亦因而死十九未來現在常行放逸二十大王凡夫之人當於此身常作如是二十種觀作是觀已不樂生死不樂生死則得止觀云云阿闍世言如我解佛所説義者我從昔來初未曾觀是二十事故造衆惡造衆惡故則有死畏三惡道畏世尊自我招殃造茲重惡父王無辜橫加逆害是二十事設觀不觀必定當墮阿鼻地獄佛告大王一切諸法性相無常無有決定王云何言必定當墮阿鼻地獄阿闍世王白佛言世尊若一切法無定相者我之殺罪亦應不定若殺定者一切諸法則非不定佛言善哉善哉諸佛世尊説一切法悉無定相王復能知殺亦不定是故當知殺無定相如是種種為説色法本空無處可殺乃至云大王一切衆生所有罪業凡有二種一者輕二者重若心口作則名為輕身口心作則名為重大王心念口言身不作者所得報輕大王昔日口不敕殺但言削足大王頻婆娑羅往有惡心於毗富羅山遊行獵鹿周遍曠野悉無所得惟見一仙五通具足見已即生瞋恚惡心我今遊獵所以不得正坐此仙驅逐令去即敕左右而令殺之其人臨終生瞋惡心退失神通而作誓言我實無辜汝以心口橫加殺戮我於來世亦當如是還以心口而害於汝時王聞已即生悔心供養死尸先王如是尚得輕受不墮地獄況王不爾而當地獄受果報耶先王自作還自受之云何令王而得殺罪云云爾時阿闍世王如佛所説觀色乃至觀識作是觀已即白佛言世尊我今始知色是無常乃至識是無常我本若能如是知者則不作罪世尊我見世間從伊蘭子生伊蘭樹不見伊蘭生栴檀我今始見從伊蘭子生栴檀樹伊蘭樹者我身是也栴檀樹者即是我心無根信也無根信者我初不知恭敬如來不信法僧是名無根世尊我若不遇如來世尊當於無量阿僧祇劫在大地獄受無量苦我今見佛以是見佛所得功德破壞衆生所有一切煩惱惡心佛言大王善哉善哉我今知汝心能壞衆生惡世尊若我審能破壞衆生諸惡心者使我常在地獄無量劫中為諸衆生受大苦惱不以為苦爾時摩伽陀國無量人民悉發阿耨多羅三藐三菩提心如是等無量人民發大心故阿闍世王所有重罪即得微薄爾時阿闍世王語耆婆言我今未死已得天身捨於短命而得長命捨無常身而得常身令諸衆生發阿耨多羅三藐三菩提心即是天身長命常身即是諸佛弟子説是語已即以種種寶幢幡蓋香華瓔珞微妙妓樂而供養佛復以偈頌而讚歎言廣如經説爾時世尊讚阿闍世王善哉善哉若有人能發菩提心當知是人則為莊嚴諸佛大衆大王汝昔已於毗婆尸佛初發阿耨多羅三藐三菩提心從是已來至我出世於其中間未曾墮於地獄受苦大王當知菩提之心乃有如是無量果報大王從今已往當勤修菩提之心何以故從是因緣當得消無量惡故爾時阿闍世王及摩伽陀國人民從座而起繞佛三匝辭退還宮釋曰阿闍世王順調達惡友之教弒父自立復欲加害其母亦修惡之極者也而此修惡必墮地獄今得免墮獄之苦者有四因緣一有重悔一得遇善友一得值佛一得聞大乘大涅槃經因而達修惡即性惡性惡融通無法不趣任運攝得佛界性善故發阿耨多羅三藐三菩提心獲無根之信無根信者所謂伊蘭子上出栴檀也伊蘭極臭之物也子宜出伊蘭極臭之樹今乃於伊蘭子上而出栴檀極香之樹非悟修惡即性惡其性融通任運攝得佛界栴檀性善乎以喻求法從可知也客曰弟子初然狃於常聞誤以人間修惡而為性惡且不知性惡乃佛性異名故一聞台教性惡之名駭耳驚心生種種疑難今蒙多方開示方知修惡之為言其包也廣下至地獄上至菩薩修善之言其攝也博漸於人天而極於佛若夫性善之極則惟在於佛性具之惡則遍該乎九雖言善惡實不分而分分而不分故得性善性惡其理融通是則九界性惡遍處即佛界性善遍處故九種法界從性惡以起修惡若菩薩若聲聞若緣覺若天人阿修羅地獄餓鬼畜生所有正報之身色依報之國土上及於天下及於地出河國土草芥人畜皆修惡也莫不全性惡之所起也然則修惡遍處即性惡遍莫不全水以為水氷還即水全波以為水水本具波全空以投器器器皆空以至全陽春而發生萬物而物物皆春是則日用之間見聞之際頭頭物物事事心心莫不皆修惡也即性惡也性惡融通任運攝得佛界性善不須轉側以明此心而見此性在人即人謂之直人可也在天即天謂之義天可也在聲聞即聲聞以佛道聲令一切聞謂之真聲聞可也在羅漢即羅漢普於其中應受供養謂之真羅漢可也在菩薩即菩薩充櫎其六度萬行之心務使覺行圓滿謂之真菩薩可也至於垂形惡趣乃菩薩大權之能事將來果成稱性施設皆非分外今且務使其即修惡以即性惡以為己躬履踐若天全性惡而起妙用以神通而駭動智辨以宣揚謂之性惡法門者弟子則雖有其心而未有其𮌎目前且發空願以師此論而為人演説之剞劂以流通之使人人悟性各各知歸庶幾將此深心奉塵剎是則名為報師恩也合十槃談瞻仰而退永嘉縣漁潭寺受戒弟子衆等奉刻流通
